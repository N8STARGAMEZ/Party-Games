<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTY VAULT — Mini Games</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --bg: #0d0d1a;
  --card: #16162a;
  --border: #2a2a4a;
  --accent1: #ff4f7b;
  --accent2: #4fc3f7;
  --accent3: #a78bfa;
  --accent4: #fbbf24;
  --accent5: #34d399;
  --text: #f0f0ff;
  --muted: #7a7a9d;
  --radius: 18px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ──── STARS BG ──── */
.stars {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse at 20% 50%, #1a1040 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, #0d2040 0%, transparent 60%),
              var(--bg);
}
.stars::before {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(1px 1px at 10% 20%, #fff6 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 60%, #fff4 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 10%, #fff5 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 80%, #fff3 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 35%, #fff6 0%, transparent 100%),
    radial-gradient(2px 2px at 15% 75%, #fff3 0%, transparent 100%),
    radial-gradient(1px 1px at 92% 60%, #fff5 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 45%, #fff4 0%, transparent 100%),
    radial-gradient(2px 2px at 60% 25%, #fff2 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 90%, #fff4 0%, transparent 100%);
}

/* ──── SCREENS ──── */
.screen {
  display: none; position: relative; z-index: 1;
  min-height: 100vh;
  padding: 20px;
  animation: fadeIn .3s ease;
}
.screen.active { display: flex; flex-direction: column; align-items: center; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

/* ──── TITLE SCREEN ──── */
#screen-title {
  justify-content: center;
  gap: 32px;
  text-align: center;
}
.big-title {
  font-family: 'Boogaloo', cursive;
  font-size: clamp(56px, 10vw, 110px);
  letter-spacing: 4px;
  line-height: 1;
  background: linear-gradient(135deg, var(--accent1), var(--accent3), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 30px #ff4f7b66);
  animation: pulse-title 3s ease-in-out infinite;
}
@keyframes pulse-title {
  0%,100% { filter: drop-shadow(0 0 30px #ff4f7b66); }
  50% { filter: drop-shadow(0 0 60px #a78bfa88); }
}
.sub-title { color: var(--muted); font-size: 18px; letter-spacing: 2px; text-transform: uppercase; }

.mode-cards {
  display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
  margin-top: 12px;
}
.mode-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 36px 48px;
  cursor: pointer;
  transition: all .25s;
  min-width: 200px;
  text-align: center;
}
.mode-card:hover {
  transform: translateY(-6px) scale(1.03);
  border-color: var(--accent3);
  box-shadow: 0 12px 40px #a78bfa33;
}
.mode-card .icon { font-size: 48px; margin-bottom: 12px; }
.mode-card h2 { font-size: 22px; font-weight: 900; }
.mode-card p { color: var(--muted); font-size: 14px; margin-top: 4px; }

/* ──── GAME SELECT ──── */
#screen-select {
  gap: 32px;
  padding: 40px 20px;
}
.screen-header {
  display: flex; align-items: center; gap: 16px;
  width: 100%; max-width: 900px;
}
.back-btn {
  background: var(--card); border: 2px solid var(--border);
  border-radius: 50%; width: 44px; height: 44px;
  color: var(--text); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; flex-shrink: 0;
}
.back-btn:hover { border-color: var(--accent1); color: var(--accent1); }
.screen-title-sm {
  font-family: 'Boogaloo', cursive;
  font-size: 36px;
  background: linear-gradient(135deg, var(--accent1), var(--accent3));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
  width: 100%; max-width: 1100px;
}
.game-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 24px;
  cursor: pointer;
  transition: all .25s;
  position: relative;
  overflow: hidden;
}
.game-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: var(--clr);
  opacity: 0; transition: opacity .25s;
}
.game-card:hover { transform: translateY(-5px); box-shadow: 0 12px 35px #00000055; }
.game-card:hover::before { opacity: 1; }
.game-card:hover { border-color: var(--clr); }
.game-icon { font-size: 44px; margin-bottom: 14px; }
.game-name { font-size: 20px; font-weight: 900; margin-bottom: 6px; }
.game-desc { color: var(--muted); font-size: 13px; line-height: 1.5; }
.game-players {
  margin-top: 14px;
  display: inline-block;
  background: #ffffff0f;
  border-radius: 99px;
  padding: 4px 12px;
  font-size: 12px;
  color: var(--muted);
}

/* ──── LOBBY ──── */
#screen-lobby {
  gap: 24px;
  padding: 40px 20px;
  align-items: center;
}
.lobby-box {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  width: 100%; max-width: 560px;
  text-align: center;
}
.lobby-box h2 { font-size: 26px; font-weight: 900; margin-bottom: 8px; }
.lobby-box .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
.room-code {
  font-family: 'Boogaloo', cursive;
  font-size: 52px;
  letter-spacing: 10px;
  color: var(--accent4);
  margin: 16px 0;
  cursor: pointer;
  transition: opacity .2s;
}
.room-code:hover { opacity: .7; }
.players-list {
  display: flex; flex-wrap: wrap; gap: 10px;
  justify-content: center; margin: 20px 0;
}
.player-chip {
  background: #ffffff0f;
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 700;
  display: flex; align-items: center; gap: 8px;
}
.player-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent5); }
.player-chip .dot.pending { background: var(--accent4); }
.input-group { display: flex; gap: 10px; margin: 12px 0; }
.input-group input {
  flex: 1;
  background: #ffffff08;
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  outline: none;
  transition: border-color .2s;
}
.input-group input:focus { border-color: var(--accent3); }

/* ──── BUTTONS ──── */
.btn {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  padding: 14px 28px;
  cursor: pointer;
  transition: all .2s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent1), var(--accent3));
  color: #fff;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px #ff4f7b44; }
.btn-secondary {
  background: var(--card);
  border: 2px solid var(--border);
  color: var(--text);
}
.btn-secondary:hover { border-color: var(--accent3); color: var(--accent3); }
.btn-success {
  background: linear-gradient(135deg, var(--accent5), #059669);
  color: #fff;
}
.btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 24px #34d39944; }
.btn-warn {
  background: linear-gradient(135deg, var(--accent4), #d97706);
  color: #fff;
}
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }

/* ──── GAME AREA ──── */
#screen-game {
  padding: 0;
  align-items: stretch;
}
#game-container {
  width: 100%; min-height: 100vh;
}

/* ──── MODAL ──── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: #000000aa; backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 36px;
  max-width: 460px; width: 90%;
  text-align: center;
  animation: fadeIn .2s ease;
}
.modal h2 { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
.modal p { color: var(--muted); margin-bottom: 24px; }
.modal-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

/* ──── STATUS BAR ──── */
.status-bar {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--card); border: 1px solid var(--border);
  border-radius: 99px; padding: 10px 20px;
  font-size: 13px; color: var(--muted);
  z-index: 50; display: none;
}
.status-bar.visible { display: block; }

/* ──────────────────────────────────────
   GAME STYLES
────────────────────────────────────── */

/* WAVELENGTH */
.wl-wrap {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 28px;
  padding: 30px;
  background: radial-gradient(ellipse at center, #1a0d40 0%, #0d0d1a 70%);
}
.wl-title { font-family:'Boogaloo',cursive; font-size:40px; color:var(--accent3); }
.wl-clue-area { text-align:center; }
.wl-spectrum {
  width: min(700px, 90vw);
  position: relative;
}
.wl-bar {
  width: 100%; height: 80px;
  border-radius: 40px;
  background: linear-gradient(90deg, #1e40af, #6d28d9, #db2777, #dc2626);
  position: relative;
  cursor: pointer;
  box-shadow: 0 0 40px #a78bfa44;
}
.wl-labels {
  display: flex; justify-content: space-between;
  font-size: 13px; color: var(--muted); margin-top: 8px;
}
.wl-needle {
  position: absolute; top: -10px;
  width: 4px; height: 100px;
  background: #fff;
  border-radius: 2px;
  transform: translateX(-50%);
  pointer-events: none;
  transition: left .1s;
}
.wl-needle::after {
  content: '▼'; position: absolute; top:-20px; left:50%;
  transform: translateX(-50%); color:#fff; font-size:16px;
}
.wl-score-zone {
  position: absolute; top:0; height:100%; border-radius: 40px;
  background: #ffffff22; pointer-events:none;
  transition: all .3s;
}
.wl-card {
  background: var(--card); border: 2px solid var(--border);
  border-radius: var(--radius); padding: 28px 40px; text-align:center;
  min-width: 300px;
}
.wl-card .phase-label { color: var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:2px; margin-bottom:8px; }
.wl-card .big-text { font-family:'Boogaloo',cursive; font-size:32px; }
.wl-points { font-size:48px; font-family:'Boogaloo',cursive; color:var(--accent4); }

/* INFILTRATOR */
.inf-wrap {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 24px;
  padding: 30px;
  background: radial-gradient(ellipse at 30% 30%, #1a0a0a 0%, #0d0d1a 70%);
}
.inf-title { font-family:'Boogaloo',cursive; font-size:40px; color:var(--accent1); }
.inf-role-card {
  background: var(--card); border: 3px solid var(--border);
  border-radius: 24px; padding: 40px 60px;
  text-align: center; min-width: 320px;
  position: relative; overflow: hidden;
}
.inf-role-card.is-spy { border-color: var(--accent1); box-shadow: 0 0 40px #ff4f7b33; }
.inf-role-card.is-crew { border-color: var(--accent5); box-shadow: 0 0 40px #34d39933; }
.inf-role { font-family:'Boogaloo',cursive; font-size:52px; margin-bottom:8px; }
.inf-word { font-size:22px; font-weight:900; color:var(--accent2); }
.inf-votes { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:500px; }
.vote-btn {
  background: var(--card); border: 2px solid var(--border);
  border-radius: 12px; padding: 10px 20px;
  color: var(--text); cursor: pointer; font-family:'Nunito',sans-serif;
  font-weight:700; transition: all .2s;
}
.vote-btn:hover { border-color: var(--accent1); color: var(--accent1); }
.vote-btn.voted { background: var(--accent1); border-color: var(--accent1); color:#fff; }
.tasks-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:560px; }
.task-tile {
  background: var(--card); border: 2px solid var(--border);
  border-radius: 14px; padding: 20px; text-align:center;
  cursor:pointer; transition: all .2s; font-size:13px;
}
.task-tile:hover { border-color: var(--accent2); }
.task-tile.done { border-color: var(--accent5); background:#34d39922; }
.task-tile .task-icon { font-size:28px; margin-bottom:6px; }

/* SKETCH RELAY */
.sk-wrap {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; gap: 20px; padding: 30px;
  background: radial-gradient(ellipse at 60% 40%, #0a1a10 0%, #0d0d1a 70%);
}
.sk-title { font-family:'Boogaloo',cursive; font-size:40px; color:var(--accent5); }
.sk-canvas-wrap {
  position:relative; background:#1a1a2e;
  border: 2px solid var(--border); border-radius: var(--radius);
  overflow: hidden;
}
canvas#sk-canvas { display:block; cursor:crosshair; touch-action:none; }
.sk-toolbar {
  display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center;
}
.sk-color { width:32px; height:32px; border-radius:50%; cursor:pointer;
  border:3px solid transparent; transition: transform .15s; }
.sk-color.active { border-color:#fff; transform: scale(1.2); }
.sk-size { display:flex; gap:6px; }
.sk-size-btn {
  background: var(--card); border:2px solid var(--border);
  border-radius:8px; width:36px; height:36px;
  color:var(--text); cursor:pointer; font-size:12px; font-weight:700;
  font-family:'Nunito',sans-serif; transition: all .2s;
}
.sk-size-btn.active { border-color: var(--accent5); }
.sk-word-reveal {
  font-family:'Boogaloo',cursive; font-size:32px;
  background: var(--card); border:2px solid var(--border);
  border-radius: var(--radius); padding:16px 32px;
  color: var(--accent4);
}
.sk-chain { display:flex; flex-direction:column; gap:12px; max-width:600px; width:100%; }
.sk-chain-item {
  background: var(--card); border:2px solid var(--border);
  border-radius:14px; padding:14px 20px;
  display:flex; align-items:center; gap:14px;
}
.sk-chain-item img { width:100px; height:70px; object-fit:contain; border-radius:8px; background:#0d0d1a; }
.sk-guess-input {
  flex:1; background:#ffffff08; border:2px solid var(--border);
  border-radius:10px; padding:10px 14px; color:var(--text);
  font-family:'Nunito',sans-serif; font-size:15px; outline:none;
}
.sk-guess-input:focus { border-color: var(--accent5); }

/* BRAWL */
.br-wrap {
  width:100%; height:100vh; overflow:hidden; position:relative;
  background: #0a1a0a;
}
canvas#br-canvas { display:block; }
.br-hud {
  position:absolute; top:16px; left:0; right:0;
  display:flex; justify-content:center; gap:32px;
  pointer-events:none; z-index:10;
}
.br-health-bar {
  background: var(--card); border:2px solid var(--border);
  border-radius:99px; padding:8px 16px;
  display:flex; align-items:center; gap:10px; font-weight:800; font-size:14px;
}
.br-hp { width:120px; height:12px; background:#333; border-radius:6px; overflow:hidden; }
.br-hp-fill { height:100%; border-radius:6px; transition: width .2s; }
.br-controls-hint {
  position:absolute; bottom:12px; left:0; right:0;
  text-align:center; color: var(--muted); font-size:12px; pointer-events:none;
}

/* LIAR ─── */
.lr-wrap {
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:24px; padding:30px;
  background: radial-gradient(ellipse at 70% 60%, #1a1000 0%, #0d0d1a 70%);
}
.lr-title { font-family:'Boogaloo',cursive; font-size:40px; color:var(--accent4); }
.lr-word-card {
  background: var(--card); border:3px solid var(--border);
  border-radius:24px; padding:36px 56px; text-align:center;
  min-width:300px;
}
.lr-word-card .the-word { font-family:'Boogaloo',cursive; font-size:56px; color:var(--accent4); }
.lr-word-card .genre { font-size:15px; color:var(--muted); text-transform:uppercase; letter-spacing:2px; }
.lr-word-card .liar-label { color:var(--accent1); font-size:20px; font-weight:900; margin-bottom:8px; }
.lr-players { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:560px; }
.lr-player-btn {
  background: var(--card); border:2px solid var(--border);
  border-radius:14px; padding:12px 24px;
  color:var(--text); cursor:pointer; font-family:'Nunito',sans-serif;
  font-weight:700; font-size:15px; transition: all .2s;
}
.lr-player-btn:hover { border-color:var(--accent4); }
.lr-player-btn.suspect { border-color:var(--accent1); background: #ff4f7b22; color:var(--accent1); }

/* ──── NOTIFICATION ──── */
.notif {
  position:fixed; top:20px; right:20px; z-index:200;
  background: var(--card); border:2px solid var(--border);
  border-radius:14px; padding:14px 20px;
  font-size:14px; font-weight:700;
  animation: slideIn .3s ease, fadeOut .3s ease 2.7s forwards;
  max-width:300px;
}
@keyframes slideIn { from { transform:translateX(120%); opacity:0; } to { transform:none; opacity:1; } }
@keyframes fadeOut { from { opacity:1; } to { opacity:0; pointer-events:none; } }
.notif.success { border-color: var(--accent5); color: var(--accent5); }
.notif.error { border-color: var(--accent1); color: var(--accent1); }
.notif.info { border-color: var(--accent2); color: var(--accent2); }

/* ──── MISC ──── */
.divider {
  width:100%; max-width:560px;
  border:none; border-top: 1px solid var(--border);
  margin: 8px 0;
}
.text-muted { color: var(--muted); font-size:14px; }
.flex-center { display:flex; align-items:center; justify-content:center; gap:12px; }
.badge {
  background: linear-gradient(135deg, var(--accent1), var(--accent3));
  border-radius:99px; padding:4px 12px; font-size:12px; font-weight:800;
}

/* Online badge */
.online-badge {
  position: fixed; top:16px; right:16px; z-index:50;
  background: var(--card); border:2px solid var(--accent5);
  border-radius:99px; padding:6px 14px;
  font-size:12px; color:var(--accent5); font-weight:700;
  display:none;
}
.online-badge.visible { display:block; }

/* scoreboard */
.scoreboard { width:100%; max-width:500px; }
.score-row {
  display:flex; justify-content:space-between; align-items:center;
  background: var(--card); border:2px solid var(--border);
  border-radius:12px; padding:12px 20px; margin-bottom:8px;
}
.score-row .name { font-weight:800; }
.score-row .pts { font-family:'Boogaloo',cursive; font-size:24px; color:var(--accent4); }
.score-row.winner { border-color: var(--accent4); box-shadow:0 0 20px #fbbf2444; }

/* responsive */
@media(max-width:600px){
  .mode-card { padding:24px 32px; }
  .games-grid { grid-template-columns:1fr 1fr; }
  .tasks-grid { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<div class="stars"></div>

<!-- ONLINE BADGE -->
<div class="online-badge" id="online-badge">● ONLINE</div>

<!-- ──── TITLE SCREEN ──── -->
<div class="screen active" id="screen-title">
  <div class="big-title">PARTY VAULT</div>
  <div class="sub-title">Pick your vibe</div>
  <div class="mode-cards">
    <div class="mode-card" onclick="chooseSingleplayer()">
      <div class="icon">🎮</div>
      <h2>Singleplayer</h2>
      <p>Play solo or pass & play</p>
    </div>
    <div class="mode-card" onclick="chooseOnline()">
      <div class="icon">🌐</div>
      <h2>Online</h2>
      <p>Play with friends via link</p>
    </div>
  </div>
  <div class="text-muted" style="margin-top:12px;">6 party games · up to 8 players</div>
</div>

<!-- ──── NAME SCREEN ──── -->
<div class="screen" id="screen-name">
  <div style="max-width:420px;width:100%;text-align:center;display:flex;flex-direction:column;gap:20px;margin:auto;">
    <div class="screen-title-sm">What's your name?</div>
    <div class="input-group">

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function notify(msg, type='info') {
  const n = document.createElement('div');
  n.className = `notif ${type}`;
  n.textContent = msg;
  document.body.appendChild(n);
  setTimeout(() => n.remove(), 3100);
}

function showModal(title, body, btns) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent = body;
  const bc = document.getElementById('modal-btns');
  bc.innerHTML = '';
  btns.forEach(b => {
    const el = document.createElement('button');
    el.className = `btn ${b.cls || 'btn-secondary'}`;
    el.textContent = b.label;
    el.onclick = () => { closeModal(); b.action(); };
    bc.appendChild(el);
  });
  document.getElementById('modal').classList.add('active');
}
function closeModal() { document.getElementById('modal').classList.remove('active'); }

function chooseOnline() {
  STATE.mode = 'online';

  // completes while the user is still typing their name / room code.
  if (!STATE._prewarmPeer) {
    try {
      STATE._prewarmPeer = new Peer();
      STATE._prewarmPeer.on('error', () => { STATE._prewarmPeer = null; });
    } catch(e) { STATE._prewarmPeer = null; }
  }
  showScreen('screen-name');
}

    showScreen('screen-select');

// ══════════════════════════════════════
//  PEERJS ONLINE
// ══════════════════════════════════════
function initPeer() {
  const code = Math.random().toString(36).substring(2,8).toUpperCase();
  STATE.roomCode = code;
  STATE.isHost = true;

  try {
    STATE.peer = new Peer('partyvault-' + code);
    STATE.peer.on('open', () => {
      document.getElementById('room-code-display').textContent = code;
      document.getElementById('room-code-display').title = 'Click to copy';
      notify('Room created! Share code: ' + code, 'success');
      document.getElementById('online-badge').classList.add('visible');
      refreshLobbyPlayers();
    });
    STATE.peer.on('connection', conn => {
      conn.on('open', () => {
        STATE.connections.push(conn);
        conn.on('data', d => handlePeerData(d, conn));
        conn.on('close', () => {
          STATE.connections = STATE.connections.filter(c => c !== conn);
          STATE.players = STATE.players.filter(p => p.id !== conn.peer);
          refreshLobbyPlayers(); broadcastState();
        });
      });
    });
    STATE.peer.on('error', e => notify('Peer error: ' + e.type, 'error'));
  } catch(e) {
    notify('PeerJS not available – running in local mode', 'error');
  }
}

function joinRoom() {
  const code = document.getElementById('join-code-input').value.trim().toUpperCase();
  if (code.length < 4) { notify('Enter a valid code', 'error'); return; }
  STATE.roomCode = code;
  STATE.isHost = false;

  const joinBtn = document.querySelector('#screen-online-lobby .btn-primary');
  if (joinBtn) { joinBtn.disabled = true; joinBtn.textContent = 'Joining…'; }
  const resetBtn = () => { if (joinBtn) { joinBtn.disabled = false; joinBtn.textContent = 'Join'; } };

  function doConnect(peer) {
    STATE.peer = peer;
    const conn = peer.connect('partyvault-' + code, { reliable: true });
    STATE.hostConn = conn;
    conn.on('open', () => {
      conn.send({ type: 'join', name: STATE.playerName, id: peer.id });
      document.getElementById('online-badge').classList.add('visible');
      notify('Joined room ' + code, 'success');
      resetBtn();
    });
    conn.on('data', d => handlePeerData(d, conn));
    conn.on('close', () => notify('Disconnected from host', 'error'));
    conn.on('error', () => { notify('Could not connect to room', 'error'); resetBtn(); });
  }

  try {
    // Reuse the pre-warmed peer if it's already open, otherwise fall back
    const pw = STATE._prewarmPeer;
    if (pw && pw.open) {
      STATE._prewarmPeer = null;
      doConnect(pw);
    } else if (pw) {
      // Still connecting — wait for open
      STATE._prewarmPeer = null;
      pw.on('open', () => doConnect(pw));
      pw.on('error', () => {
        // Pre-warm failed; create fresh
        const fresh = new Peer();
        fresh.on('open', () => doConnect(fresh));
        fresh.on('error', () => { notify('Could not connect', 'error'); resetBtn(); });
      });
    } else {
      const fresh = new Peer();
      fresh.on('open', () => doConnect(fresh));
      fresh.on('error', () => { notify('Could not connect', 'error'); resetBtn(); });
    }
  } catch(e) {
    notify('Could not connect', 'error');
    resetBtn();
  }
}

function handlePeerData(data, conn) {
  if (data.type === 'join') {
    // host receives join
    const p = { id: conn.peer, name: data.name, score: 0 };
    STATE.players.push(p);
    refreshLobbyPlayers();
    broadcastState();
    if (STATE.players.length >= 2)
      document.getElementById('start-online-btn').disabled = false;
  } else if (data.type === 'state') {
    // guest receives full state update
    STATE.players = data.players;
    STATE.roomCode = data.roomCode;
    document.getElementById('room-code-display').textContent = data.roomCode;
    refreshLobbyPlayers();
  } else if (data.type === 'start') {
    launchGame(data.gameId, true);
  } else if (data.type === 'game') {
    // game-specific relay
    if (window._gameDataHandler) window._gameDataHandler(data);
  }
}

function broadcastState() {
  const msg = { type: 'state', players: STATE.players, roomCode: STATE.roomCode };
  STATE.connections.forEach(c => { try { c.send(msg); } catch(e){} });
}

function broadcastGame(data) {
  const msg = { type: 'game', ...data };
  if (STATE.isHost) STATE.connections.forEach(c => { try { c.send(msg); } catch(e){} });
  else if (STATE.hostConn) { try { STATE.hostConn.send(msg); } catch(e){} }
}

function refreshLobbyPlayers() {
  const el = document.getElementById('lobby-players');
  if (!el) return;
  el.innerHTML = '';
  const me = { id: 'local', name: STATE.playerName, score: 0 };

// ══════════════════════════════════════
//  GAME LAUNCHER
// ══════════════════════════════════════

// Global session token — incremented every time we launch/leave a game.
// Each game's timers capture the token at creation; they bail out if it has changed.
let _gameSession = 0;

function launchGame(id, fromPeer=false) {
  // Kill any previous game's timers
  _gameSession++;
  if (window._cleanup) { window._cleanup(); window._cleanup = null; }
  window._gameDataHandler = null;

  if (STATE.mode === 'online' && STATE.isHost && !fromPeer) {
    STATE.connections.forEach(c => { try { c.send({ type:'start', gameId:id }); } catch(e){} });
  }
  STATE.currentGame = id;
  STATE.gameData = {};

  // Ensure we have some players for solo
  if (STATE.mode === 'solo' && STATE.players.length < 2) {
    STATE.players = [
      { id:'local', name: STATE.playerName, score:0 },
      { id:'p2', name:'Alex', score:0 },
      { id:'p3', name:'Jordan', score:0 },
      { id:'p4', name:'Riley', score:0 },
    ];
  }

  showScreen('screen-game');
  const container = document.getElementById('game-container');
  container.innerHTML = '';

  switch(id) {
    case 'wavelength': initWavelength(container); break;
    case 'infiltrator': initInfiltrator(container); break;
    case 'sketch':      initSketch(container); break;
    case 'brawl':       initBrawl(container); break;
    case 'liar':        initLiar(container); break;
    case 'trivia':      initTrivia(container); break;
    case 'garticswap':  initGarticSwap(container); break;
    case 'garticrelay': initGarticRelay(container); break;
  }
}

function backToMenu() {
  _gameSession++; // invalidate any running timers
  if (window._cleanup) { window._cleanup(); window._cleanup = null; }
  window._gameDataHandler = null;
  if (STATE.mode === 'online' && !STATE.isHost) {
    // Guests go to waiting screen, not the game picker
    showGuestWaitScreen();
  } else {
    buildGameSelect();
    showScreen('screen-select');
  }
}

// ══════════════════════════════════════
//  GAME 1 — MIND FREQUENCY (Wavelength)
// ══════════════════════════════════════
function initWavelength(container) {

  // No pre-chosen words — cluer invents their own word based on needle position
  const CATEGORIES = [
    { left:'Not Comfy',   right:'Very Comfy',    genre:'Furniture' },
    { left:'Cold',        right:'Hot',            genre:'Drinks' },
    { left:'Slow',        right:'Fast',           genre:'Vehicles' },
    { left:'Quiet',       right:'Loud',           genre:'Instruments' },
    { left:'Cheap',       right:'Expensive',      genre:'Holidays' },
    { left:'Tiny',        right:'Gigantic',       genre:'Animals' },
    { left:'Boring',      right:'Thrilling',      genre:'Hobbies' },
    { left:'Easy',        right:'Brutal',         genre:'School Subjects' },
    { left:'Ugly',        right:'Beautiful',      genre:'Architecture' },
    { left:'Weak',        right:'Overpowered',    genre:'Superpowers' },
    { left:'Forgettable', right:'Iconic',         genre:'Movie Scenes' },
    { left:'Safe',        right:'Dangerous',      genre:'Sports' },
    { left:'Short',       right:'Long',           genre:'Films' },
    { left:'Weak',        right:'Strong',         genre:'Coffee' },
    { left:'Calm',        right:'Chaotic',        genre:'Cities' },
    { left:'Cheap',       right:'Posh',           genre:'Restaurants' },
    { left:'Forgettable', right:'Iconic',         genre:'TV Shows' },
    { left:'Terrible',    right:'Amazing',        genre:'Pizza Toppings' },
    { left:'Underrated',  right:'Overrated',      genre:'Snack Foods' },
    { left:'Boring',      right:'Wild',           genre:'Fashion Trends' },
    { left:'Relaxing',    right:'Stressful',      genre:'Jobs' },
    { left:'Disgusting',  right:'Delicious',      genre:'Cheeses' },
    { left:'Childish',    right:'Mature',         genre:'Board Games' },
    { left:'Niche',       right:'Mainstream',     genre:'Music Genres' },
    { left:'Wholesome',   right:'Scandalous',     genre:'Reality TV Shows' },
    { left:'Forgettable', right:'Legendary',      genre:'Video Games' },
    { left:'Useless',     right:'Essential',      genre:'Kitchen Gadgets' },
    { left:'Depressing',  right:'Uplifting',      genre:'Film Genres' },
    { left:'Overpriced',  right:'Great Value',    genre:'Supermarket Products' },
    { left:'Tame',        right:'Extreme',        genre:'Roller Coasters' },
    { left:'Annoying',    right:'Adorable',       genre:'Pet Behaviours' },
    { left:'Bland',       right:'Bold',           genre:'Cocktails' },
    { left:'Forgettable', right:'Haunting',       genre:'Song Lyrics' },
    { left:'Chill',       right:'Intense',        genre:'Workout Types' },
    { left:'Dated',       right:'Timeless',       genre:'Fashion Decades' },
    { left:'Low Stakes',  right:'High Stakes',    genre:'Card Games' },
    { left:'Terrible',    right:'Brilliant',      genre:'Movie Sequels' },
    { left:'Obscure',     right:'Universally Known', genre:'Historical Figures' },
    { left:'Silent',      right:'Loud',           genre:'Neighbourhoods' },
    { left:'Mediocre',    right:'Life-Changing',  genre:'Travel Destinations' },
  ].sort(() => Math.random() - 0.5);

  // Custom mode: each cluer sets their own prompt before their turn
  const _customMode = !!(STATE._mfCustom === 'custom');
  STATE._mfCustom = null; // consume it

  const TOTAL_ROUNDS = _customMode ? null : Math.min(CATEGORIES.length, 6); // null = one round per player

  const isOnline = STATE.mode === 'online';
  const amHost   = !isOnline || STATE.isHost;

  const players = (() => {
    if (!isOnline) {
      return STATE.players.length >= 2 ? STATE.players : [
        { id:'local', name: STATE.playerName, score:0 },
        { id:'p2',    name:'Player 2',        score:0 },
      ];
    }
    const me = { id: STATE.peer ? STATE.peer.id : 'host', name: STATE.playerName, score:0 };
    if (amHost) {
      // Filter out 'local' placeholder — host adds itself as `me`
      const guests = STATE.players.filter(p => p.id !== 'local');
      return [me, ...guests.map(p => ({ id:p.id||p, name:p.name||p, score:0 }))];
    } else {
      return STATE.players.length >= 2
        ? STATE.players.map(p=>({...p, score:p.score||0}))
        : [{ id:'host', name:'Host', score:0 }, me];
    }
  })();

  let roundIdx = 0;
  let cluerIdx = 0;
  let scores   = {};
  players.forEach(p => scores[p.id] = 0);

  // Custom mode: each cluer builds their own spectrum prompt
  // customPrompts[playerIdx] = { left, right, genre } — filled as each cluer sets it
  const customPrompts = {};

  // Total rounds = one per player in custom mode, else 6
  const effectiveTotalRounds = _customMode ? players.length : TOTAL_ROUNDS;

  // Per-round state (host is source of truth)
  let cat      = null;
  let target   = 0;     // needle position — only cluer sees it initially
  let phase    = _customMode ? 'cluer-setup' : 'cluer-chat';
  // phases: 'cluer-setup' (custom only) | 'cluer-chat' | 'guesser-drag' | 'round-result'
  let chatMsgs = [];    // [{ sender, text }]
  let guessPos = 50;    // guesser's needle answer
  let clueWord = '';    // the word the cluer typed (revealed at results)

  function getCluer()    { return players[cluerIdx % players.length]; }
  function getGuessers() { return players.filter((_,i) => i !== (cluerIdx % players.length)); }
  function amCluer() {
    if (!isOnline) return true;
    // players[0] is always the host, players[1+] are guests
    // host is cluer when cluerIdx points to index 0
    // guest is cluer when cluerIdx points to index > 0
    const idx = cluerIdx % players.length;
    return amHost ? (idx === 0) : (idx !== 0);
  }

  // ── PeerJS ───────────────────────────────────────────────────────
  function syncToGuests(extra) {
    if (!isOnline || !amHost) return;
    broadcastGame({
      wl:true, phase, chatMsgs, guessPos,
      roundIdx, cluerIdx, scores,
      cat: cat ? { left:cat.left, right:cat.right, genre:cat.genre } : null,
      target, clueWord, _customMode,
      ...extra
    });
  }

  window._gameDataHandler = function(data) {
    if (!data.wl) return;
    if (amHost) {
      if (data.action === 'submitPrompt') {
        // Custom mode: cluer submitted their prompt
        cat = { left: data.left, right: data.right, genre: data.genre };
        target = Math.round(Math.random() * 86 + 7);
        phase = 'cluer-chat';
        chatMsgs = []; guessPos = 50; clueWord = '';
        syncToGuests();
        render();
      } else if (data.action === 'chat') {
        const msg = data.msg;
        chatMsgs.push(msg);
        clueWord = msg.text;
        syncToGuests();
        render();
      } else if (data.action === 'guess') {
        guessPos = data.guessPos;
        syncToGuests();
      } else if (data.action === 'guesserReady') {
        guessPos = data.guessPos;
        phase = 'round-result';
        calcAndSyncResults();
        render();
      }
    } else {
      // guest receives full state from host
      if (data.phase !== undefined) {
        phase    = data.phase;
        chatMsgs = data.chatMsgs || [];
        roundIdx = data.roundIdx;
        cluerIdx = data.cluerIdx;
        scores   = data.scores || scores;
        guessPos = data.guessPos || guessPos;
        clueWord = data.clueWord || '';
        if (data.cat) {
          cat    = CATEGORIES.find(c => c.genre === data.cat.genre)
                || { left:data.cat.left, right:data.cat.right, genre:data.cat.genre };
          target = data.target || 50;
        }
        render();
      }
    }
  };

  function calcAndSyncResults() {
    const guessers    = getGuessers();
    const cluerPlayer = getCluer();
    const diff = Math.abs(guessPos - target);
    let pts = 0;
    if      (diff <  5) pts = 4;
    else if (diff < 12) pts = 3;
    else if (diff < 22) pts = 2;
    else if (diff < 35) pts = 1;
    guessers.forEach(p => { scores[p.id] = (scores[p.id]||0) + pts; });
    if      (pts >= 3) scores[cluerPlayer.id] = (scores[cluerPlayer.id]||0) + 2;
    else if (pts >= 1) scores[cluerPlayer.id] = (scores[cluerPlayer.id]||0) + 1;
    syncToGuests();
  }

  function startRound() {
    if (_customMode) {
      // Custom mode: cluer needs to enter their prompt first
      cat      = null;
      target   = 0;
      phase    = 'cluer-setup';
    } else {
      cat      = CATEGORIES[roundIdx];
      target   = Math.round(Math.random() * 86 + 7); // 7–93%
      phase    = 'cluer-chat';
    }
    chatMsgs = [];
    guessPos = 50;
    clueWord = '';
    if (isOnline && amHost) syncToGuests();
    render();
  }

  // ── UI helpers ───────────────────────────────────────────────────
  function sharedHeader(subtitle) {
    return `
      <div class="wl-title">🌊 Mind Frequency</div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:2px;">
        Round ${roundIdx+1}/${effectiveTotalRounds} &nbsp;·&nbsp; ${subtitle}
      </div>
      <!-- Genre + spectrum — BOTH players always see this -->
      <div style="background:var(--card);border:2px solid var(--border);border-radius:16px;
        padding:16px 24px;max-width:480px;width:100%;box-sizing:border-box;text-align:center;">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;

        <div style="font-family:'Boogaloo',cursive;font-size:42px;color:var(--accent4);
          line-height:1;margin-bottom:10px;">${cat.genre}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;

          <span style="color:var(--accent2);">◀ ${cat.left}</span>
          <span style="color:var(--muted);font-size:18px;">←————→</span>
          <span style="color:var(--accent1);">${cat.right} ▶</span>
        </div>
      </div>`;
  }

  function renderBar(needlePos, draggable, showGoldTarget) {
    return `
      <div style="width:100%;max-width:480px;padding:6px 0 0;">
        <div id="wl-bar-wrap" style="width:100%;height:70px;border-radius:35px;
          background:linear-gradient(90deg,#1e40af,#6d28d9,#db2777,#dc2626);
          position:relative;box-shadow:0 0 28px #a78bfa33;
          cursor:${draggable?'crosshair':'default'};">
          ${showGoldTarget ? `
            <div style="position:absolute;inset:0;border-radius:35px;overflow:hidden;pointer-events:none;">
              <div style="position:absolute;top:0;height:100%;

            </div>
            <div style="position:absolute;top:50%;left:${target}%;
              transform:translate(-50%,-50%);width:6px;height:86px;border-radius:3px;

          ` : ''}
          ${needlePos !== null ? `
            <div id="wl-needle" style="position:absolute;top:50%;left:${needlePos}%;

              pointer-events:none;"></div>
          ` : ''}
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:8px;
          font-size:13px;font-weight:700;color:var(--muted);padding:0 6px;">
          <span>${cat.left}</span><span>${cat.right}</span>
        </div>
      </div>`;
  }

  function renderChat(editable) {
    const cluerPlayer = getCluer();
    return `
      <div style="width:100%;max-width:480px;">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;
          letter-spacing:1px;margin-bottom:5px;">💬 ${editable ? 'Type your clue word' : 'Clue from ' + cluerPlayer.name}</div>
        <div id="wl-chat-msgs" style="background:#0d0d1a;
          border:2px solid ${editable?'var(--accent3)':'var(--border)'};
          border-radius:${editable?'14px 14px 0 0':'14px'};
          min-height:60px;max-height:120px;overflow-y:auto;
          padding:10px 14px;display:flex;flex-direction:column;gap:6px;">
          ${chatMsgs.length === 0
            ? `<div style="color:var(--muted);font-size:13px;font-style:italic;">${editable ? 'Nothing sent yet — type below' : 'Waiting for clue…'}</div>`
            : chatMsgs.map(m=>`
                <div style="display:flex;gap:10px;align-items:baseline;">
                  <span style="font-weight:800;color:var(--accent2);font-size:12px;white-space:nowrap;">${m.sender}:</span>
                  <span style="font-size:15px;color:var(--text);font-weight:700;">${m.text}</span>
                </div>`).join('')}
        </div>
        ${editable ? `
          <div style="display:flex;border:2px solid var(--accent3);border-top:none;
            border-radius:0 0 14px 14px;overflow:hidden;">
            <input id="wl-chat-input" type="text" maxlength="40"
              placeholder="e.g. Hammock, Ferrari, Espresso…"
              style="flex:1;background:#16162a;border:none;outline:none;
                padding:11px 14px;color:var(--text);
                font-family:'Nunito',sans-serif;font-size:15px;"
              onkeydown="if(event.key==='Enter')wlSendChat()"/>
            <button onclick="wlSendChat()"
              style="background:var(--accent3);border:none;padding:0 18px;
                color:#fff;font-family:'Nunito',sans-serif;
                font-weight:800;font-size:14px;cursor:pointer;">Send</button>
          </div>` : ''}
      </div>`;
  }

  // ── Main render ──────────────────────────────────────────────────
  function render() {
    container.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'wl-wrap';
    const iAmCluer    = amCluer();
    const cluerPlayer = getCluer();
    const guessers    = getGuessers();

    // ══ PHASE: CLUER-SETUP (custom mode only) ═══════════════════
    if (phase === 'cluer-setup') {
      const cluerName = cluerPlayer.name;
      if (iAmCluer || !isOnline) {
        // The cluer fills in their custom spectrum
        wrap.innerHTML = `
          <div class="wl-title">🌊 Mind Frequency</div>

          <div style="background:var(--card);border:2px solid #a78bfa;
            border-radius:20px;padding:28px 32px;max-width:500px;width:100%;
            box-sizing:border-box;display:flex;flex-direction:column;gap:14px;">

            <div style="font-size:11px;color:#a78bfa;text-transform:uppercase;
              letter-spacing:2px;text-align:center;">🔒 Only you see this — others wait!</div>

            <!-- Genre -->
            <div>
              <label style="font-size:11px;font-weight:800;text-transform:uppercase;
                letter-spacing:1px;color:var(--muted);display:block;margin-bottom:5px;">
                🏷️ Genre / Category
              </label>
              <input id="cs-genre" type="text" maxlength="30"
                placeholder="e.g. Movies, Animals, Jobs…"
                style="width:100%;background:#ffffff08;border:2px solid #a78bfa55;
                  border-radius:10px;padding:11px 14px;color:var(--text);
                  font-family:'Nunito',sans-serif;font-size:15px;outline:none;
                  box-sizing:border-box;transition:border-color .2s;"
                onfocus="this.style.borderColor='#a78bfa'"
                onblur="this.style.borderColor='#a78bfa55'"/>
            </div>

            <!-- Left + Right -->
            <div style="display:flex;gap:10px;align-items:flex-end;">
              <div style="flex:1;">
                <label style="font-size:11px;font-weight:800;text-transform:uppercase;
                  letter-spacing:1px;color:#4fc3f7;display:block;margin-bottom:5px;">◀ Left End</label>
                <input id="cs-left" type="text" maxlength="20" placeholder="e.g. Boring"
                  style="width:100%;background:#ffffff08;border:2px solid #4fc3f755;
                    border-radius:10px;padding:10px 12px;color:var(--text);
                    font-family:'Nunito',sans-serif;font-size:14px;outline:none;
                    box-sizing:border-box;transition:border-color .2s;"
                  onfocus="this.style.borderColor='#4fc3f7'"
                  onblur="this.style.borderColor='#4fc3f755'"/>
              </div>
              <div style="padding-bottom:10px;font-size:18px;color:var(--muted);flex-shrink:0;">←→</div>
              <div style="flex:1;">
                <label style="font-size:11px;font-weight:800;text-transform:uppercase;
                  letter-spacing:1px;color:#ff4f7b;display:block;margin-bottom:5px;">Right End ▶</label>
                <input id="cs-right" type="text" maxlength="20" placeholder="e.g. Thrilling"
                  style="width:100%;background:#ffffff08;border:2px solid #ff4f7b55;
                    border-radius:10px;padding:10px 12px;color:var(--text);
                    font-family:'Nunito',sans-serif;font-size:14px;outline:none;
                    box-sizing:border-box;transition:border-color .2s;"
                  onfocus="this.style.borderColor='#ff4f7b'"
                  onblur="this.style.borderColor='#ff4f7b55'"/>
              </div>
            </div>

            <button class="btn btn-primary" id="cs-confirm-btn"
              style="background:linear-gradient(135deg,#a78bfa,#4fc3f7);">
              Set My Spectrum ✅
            </button>
          </div>
          <button class="btn btn-secondary" onclick="backToMenu()">← Back</button>`;

        container.appendChild(wrap);
        setTimeout(() => document.getElementById('cs-genre')?.focus(), 80);

        document.getElementById('cs-confirm-btn').onclick = () => {
          const genre = document.getElementById('cs-genre')?.value.trim();

          // Apply and transition to cluer-chat

            broadcastGame({ wl:true, action:'submitPrompt', left, right, genre });

    // ══ PHASE: CLUER-CHAT ════════════════════════════════════════
    if (phase === 'cluer-chat') {

      window.addEventListener('mouseup',     () => { dragging=false; });

  function showFinalResults() {
