  // also handle cluerReady from guest cluer
  const origHandler = window._gameDataHandler;
  window._gameDataHandler = function(data) {
    if (data.wl && amHost && data.action === 'cluerReady') {
      phase = 'guesser-drag';
      syncToGuests();
      render();
      return;
    }
    origHandler && origHandler(data);
  };

  startRound();
}
//  GAME 2 — SPACE MOLES (Among Us-style)
// ══════════════════════════════════════
function initInfiltrator(container) {
  const isOnline = STATE.mode === 'online';
  const amHost   = !isOnline || STATE.isHost;
  const mySession = _gameSession; // capture session

  // Build player list same pattern as wavelength
  // myPeerId must match exactly what's stored in the shared players list:
  // - Host is stored as 'local' in STATE.players (set in confirmName())
  // - Guest is stored as conn.peer (their PeerJS id) when they join
  const myPeerId = amHost ? 'local' : (STATE.peer ? STATE.peer.id : 'local');
  let players = (() => {
    if (!isOnline) {
      const base = STATE.players.length >= 2 ? STATE.players : [
        {id:'local', name:STATE.playerName},
        {id:'p2',    name:'Player 2'},
        {id:'p3',    name:'Player 3'},
        {id:'p4',    name:'Player 4'},
      ];
      return base.map(p=>({...p}));
    }
    const me = {id: myPeerId, name: STATE.playerName};
    if (amHost) {
      const guests = STATE.players.filter(p=>p.id!=='local');
      return [me, ...guests.map(p=>({id:p.id||p, name:p.name||p}))];
    } else {
      if (STATE.players.length >= 2) {
        const list = STATE.players.map(p=>({id:p.id,name:p.name}));
        // Ensure my own entry is present (it should be, host syncs it)
        if (!list.find(p=>p.id===me.id)) list.push(me);
        return list;
      }
      return [{id:'host',name:'Host'}, me];
    }
  })();

  // ── CONSTANTS ────────────────────────────────────────────────────
  const W = 1200, H = 800;   // map world size
  const SPEED = 2.8;
  const PLAYER_R = 14;
  const KILL_RANGE = 50;
  const TASK_RANGE = 40;
  const COLORS = ['#ff4f7b','#4fc3f7','#a78bfa','#34d399','#fbbf24','#f97316','#ec4899','#06b6d4'];

  // Map walls: array of {x,y,w,h} rectangles (impassable)
  const WALLS = [
    // outer border
    {x:0,   y:0,   w:W,   h:16},
    {x:0,   y:H-16,w:W,   h:16},
    {x:0,   y:0,   w:16,  h:H},
    {x:W-16,y:0,   w:16,  h:H},
    // rooms dividers
    {x:300, y:0,   w:16,  h:280},
    {x:300, y:360, w:16,  h:180},
    {x:300, y:600, w:16,  h:200},
    {x:600, y:0,   w:16,  h:220},
    {x:600, y:340, w:16,  h:160},
    {x:600, y:560, w:16,  h:240},
    {x:900, y:0,   w:16,  h:280},
    {x:900, y:360, w:16,  h:180},
    {x:900, y:600, w:16,  h:200},
    {x:300, y:260, w:316, h:16},
    {x:300, y:540, w:316, h:16},
    {x:0,   y:380, w:316, h:16},
    {x:0,   y:560, w:316, h:16},
    {x:600, y:380, w:316, h:16},
    {x:916, y:380, w:284, h:16},
  ];

  // Rooms for label rendering
  const ROOMS = [
    {name:'Reactor',   x:20,  y:20},
    {name:'MedBay',    x:320, y:20},
    {name:'Nav',       x:620, y:20},
    {name:'Comms',     x:920, y:20},
    {name:'Cafeteria', x:20,  y:400},
    {name:'Storage',   x:320, y:400},
    {name:'Admin',     x:620, y:400},
    {name:'Security',  x:920, y:400},
    {name:'Engine',    x:20,  y:580},
    {name:'Shields',   x:320, y:580},
    {name:'Weapons',   x:620, y:580},
    {name:'O2',        x:920, y:580},
  ];

  // Tasks: {id, label, x, y, duration(ms)}
  const ALL_TASKS = [
    {id:'t1', label:'Fix Wiring',    x:150, y:120, dur:4000},
    {id:'t2', label:'Fuel Engines',  x:130, y:650, dur:5000},
    {id:'t3', label:'Download Data', x:700, y:150, dur:4000},
    {id:'t4', label:'Empty Garbage', x:700, y:650, dur:3000},
    {id:'t5', label:'Calibrate',     x:1000,y:120, dur:5000},
    {id:'t6', label:'Align Shields', x:450, y:640, dur:4000},
    {id:'t7', label:'Scan Sample',   x:450, y:130, dur:3000},
    {id:'t8', label:'Chart Stars',   x:1000,y:650, dur:5000},
  ];

  // ── GAME STATE ───────────────────────────────────────────────────
  let phase = 'role-reveal'; // role-reveal | playing | meeting-discuss | meeting-vote | ended
  let impostorId = null;
  let alive = {}; // id → bool
  let tasksDone = {}; // taskId → bool (global)
  let myTaskIds = []; // which tasks I have
  let doingTask = null; // {id, progress 0-1, startTime}
  let votes = {}; // voterId → targetId
  let meetingCaller = null;
  let voteTimer = 0;
  let voteInterval = null;
  let bodyPositions = []; // [{x,y,killedId}]
  let chatLog = []; // [{name,text}] for meeting chat

  // My player position
  let myPos = {x: 100 + Math.random()*100, y: 100 + Math.random()*100};
  let myVel = {x:0, y:0};

  // Other players' positions (synced)
  let otherPos = {}; // peerId → {x,y,alive}

  // Camera offset
  let cam = {x:0, y:0};

  // Input
  const keys = {};

  // assign tasks (3 per player)
  function assignTasks() {
    const shuffled = [...ALL_TASKS].sort(()=>Math.random()-.5);
    myTaskIds = shuffled.slice(0,3).map(t=>t.id);
  }

  // ── PeerJS ───────────────────────────────────────────────────────
  function syncState() {
    if (!isOnline || !amHost) return;
    broadcastGame({sm:true, action:'state',
      phase, impostorId, alive, tasksDone, bodyPositions, chatLog, voteTimer,
      playerPositions: buildAllPositions()
    });
  }

  function buildAllPositions() {
    const pos = {[myPeerId]: {x:myPos.x, y:myPos.y, alive:alive[myPeerId]!==false}};
    Object.entries(otherPos).forEach(([id,p]) => pos[id]=p);
    return pos;
  }

  function sendMyPos() {
    if (!isOnline) return;
    broadcastGame({sm:true, action:'pos', id:myPeerId,
      x:myPos.x, y:myPos.y, alive:alive[myPeerId]!==false});
  }

  function sendAction(action, extra) {
    if (!isOnline) return;
    if (amHost) {
      // process directly
      handleAction({sm:true, action, ...extra});
    } else {
      broadcastGame({sm:true, action, ...extra});
    }
  }

  window._gameDataHandler = function(data) {
    if (!data.sm) return;
    if (amHost) {
      handleAction(data);
    } else {
      // Guest receives state broadcasts from host
      if (data.action === 'state') {
        phase        = data.phase;
        impostorId   = data.impostorId;
        alive        = data.alive || alive;
        tasksDone    = data.tasksDone || tasksDone;
        bodyPositions= data.bodyPositions || bodyPositions;
        chatLog      = data.chatLog || chatLog;
        if (data.playerPositions) {
          Object.entries(data.playerPositions).forEach(([id,p]) => {
            if (id !== myPeerId) otherPos[id] = p;
          });
        }
        if (data.voteTimer !== undefined) voteTimer = data.voteTimer;
        // Re-render overlay if in meeting
        if (phase !== 'playing') renderOverlay();
      } else if (data.action === 'pos') {
        if (data.id !== myPeerId) otherPos[data.id] = {x:data.x, y:data.y, alive:data.alive};
      } else if (data.action === 'roleReveal') {
        impostorId = data.impostorId;
        alive = data.alive;
        phase = 'role-reveal';
        showRoleReveal();
      }
    }
  };

  function handleAction(data) {
    // host processes all actions
    if (data.action === 'pos') {
      otherPos[data.id] = {x:data.x, y:data.y, alive:data.alive};
      // forward to all other guests
      if (isOnline) STATE.connections.forEach(c => {
        try { c.send({type:'game', sm:true, action:'pos',
          id:data.id, x:data.x, y:data.y, alive:data.alive}); } catch(e){}
      });
      return;
    }
    if (data.action === 'taskDone') {
      tasksDone[data.taskId] = true;
      checkCrewWin();
      syncState();
    }
    if (data.action === 'kill') {
      alive[data.targetId] = false;
      bodyPositions.push({x:data.x, y:data.y, killedId:data.targetId});
      syncState();
    }
    if (data.action === 'reportBody' || data.action === 'meeting') {
      phase = 'meeting-discuss';
      meetingCaller = data.callerId;
      chatLog = [];
      votes = {};
      voteTimer = 45;
      syncState();
      if (!isOnline) { renderOverlay(); startVoteTimer(); }
    }
    if (data.action === 'chat') {
      chatLog.push({name:data.name, text:data.text});
      syncState();
    }
    if (data.action === 'vote') {
      votes[data.voterId] = data.targetId;
      // Check if all alive voted
      const aliveIds = players.filter(p=>alive[p.id]!==false).map(p=>p.id);
      if (aliveIds.every(id => votes[id])) {
        resolveVote();
      } else {
        syncState();
      }
    }
    if (data.action === 'startGame') {
      phase = 'playing';
      syncState();
    }
  }

  function checkCrewWin() {
    const total = ALL_TASKS.length;
    const done  = Object.keys(tasksDone).length;
    if (done >= total) {
      phase = 'ended';
      STATE._smResult = 'crew';
      syncState();
      renderOverlay();
    }
  }

  function resolveVote() {
    const tally = {};
    Object.values(votes).forEach(v => { if(v!=='skip') tally[v]=(tally[v]||0)+1; });
    const ejected = Object.entries(tally).sort((a,b)=>b[1]-a[1])[0]?.[0];
    if (ejected) alive[ejected] = false;
    // Check wins
    const aliveImpostor = alive[impostorId] !== false;
    const aliveCrew = players.filter(p=>p.id!==impostorId&&alive[p.id]!==false).length;
    if (!aliveImpostor) { phase='ended'; STATE._smResult='crew'; }
    else if (aliveCrew <= 1) { phase='ended'; STATE._smResult='impostor'; }
    else { phase='meeting-vote'; } // show result then back to game? No: go to vote reveal
    phase = 'ended';
    STATE._smEjected = ejected;
    STATE._smResult = !aliveImpostor ? 'crew' : 'impostor';
    syncState();
    if (!isOnline) renderOverlay();
  }

  // ── ROLE REVEAL ──────────────────────────────────────────────────
  function showRoleReveal() {
    const amImp = myPeerId === impostorId || (!isOnline && impostorId === players[0]?.id);
    container.innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:24px;padding:30px;
      background:radial-gradient(ellipse at 30% 30%, #1a0a0a 0%, #0d0d1a 70%);">
      <div style="font-family:'Boogaloo',cursive;font-size:40px;color:var(--accent1);">🚀 Space Moles</div>
      <div style="background:var(--card);border:3px solid ${amImp?'var(--accent1)':'var(--accent5)'};
        border-radius:24px;padding:40px 60px;text-align:center;min-width:300px;
        box-shadow:0 0 40px ${amImp?'#ff4f7b33':'#34d39933'};">
        <div style="font-size:13px;color:var(--muted);margin-bottom:8px;">You are</div>
        <div style="font-family:'Boogaloo',cursive;font-size:52px;
          color:${amImp?'var(--accent1)':'var(--accent5)'};">
          ${amImp?'🕵️ IMPOSTOR':'👨‍🚀 CREWMATE'}
        </div>
        <div style="font-size:14px;color:var(--muted);margin-top:10px;">
          ${amImp?'Kill crewmates. Sabotage. Blend in.':'Complete tasks. Find the impostor.'}
        </div>
      </div>
      <button class="btn btn-primary" id="sm-start-btn" style="font-size:18px;padding:16px 40px;">
        ${amHost||!isOnline ? 'Start Game 🚀' : 'Ready ✅'}
      </button>
      <button class="btn btn-secondary" onclick="backToMenu()">← Back</button>
    </div>`;

    document.getElementById('sm-start-btn').onclick = () => {
      if (amHost || !isOnline) {
        phase = 'playing';
        if (isOnline) {
          // Send explicit startGame so guests waiting in outer handler also catch it
          broadcastGame({sm:true, action:'startGame'});
          syncState();
        }
        startGame();
      } else {
        document.getElementById('sm-start-btn').disabled = true;
        document.getElementById('sm-start-btn').textContent = 'Waiting for host…';
        broadcastGame({sm:true, action:'startGame'});
      }
    };

    // In solo mode, AIs auto-ready — start after 2.5s so player can see their role
    if (!isOnline) {
      const btn = document.getElementById('sm-start-btn');
      if (btn) {
        let countdown = 3;
        btn.textContent = `Start Game 🚀 (${countdown})`;
        const t = setInterval(() => {
          countdown--;
          const b = document.getElementById('sm-start-btn');
          if (!b) { clearInterval(t); return; }
          if (countdown <= 0) {
            clearInterval(t);
            b.click();
          } else {
            b.textContent = `Start Game 🚀 (${countdown})`;
          }
        }, 1000);
      }
    }
  }

  // ── MAIN GAME ────────────────────────────────────────────────────
  function startGame() {
    // ── Definitive peer handler — always set when game actually starts ──
    if (isOnline && !amHost) {
      window._gameDataHandler = function(d) {
        if (!d.sm) return;
        if (d.action === 'pos') {
          if (d.id !== myPeerId) otherPos[d.id] = {x:d.x, y:d.y, alive:d.alive};
        } else if (d.action === 'state') {
          const wasPlaying = phase === 'playing';
          phase=d.phase; impostorId=d.impostorId; alive=d.alive||alive;
          tasksDone=d.tasksDone||tasksDone; bodyPositions=d.bodyPositions||bodyPositions;
          chatLog=d.chatLog||chatLog;
          if (d.voteTimer !== undefined) voteTimer = d.voteTimer;
          if (d.playerPositions) Object.entries(d.playerPositions).forEach(([id,p])=>{
            if (id !== myPeerId) otherPos[id] = p;
          });
          if (phase !== 'playing') renderOverlay();
        }
      };
    }

    assignTasks();
    alive[myPeerId] = true;

    // Build canvas UI
    container.innerHTML = '';
    container.style.background = '#0a0a14';
    container.style.position = 'relative';
    container.style.overflow = 'hidden';
    container.style.width = '100vw';
    container.style.height = '100vh';

    const canvas = document.createElement('canvas');
    canvas.id = 'sm-canvas';
    canvas.style.cssText = 'position:absolute;top:0;left:0;display:block;';
    container.appendChild(canvas);

    // HUD overlay
    const hud = document.createElement('div');
    hud.id = 'sm-hud';
    hud.style.cssText = `position:absolute;top:0;left:0;right:0;pointer-events:none;z-index:10;
      display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px;`;
    container.appendChild(hud);

    // Task bar (bottom)
    const taskbar = document.createElement('div');
    taskbar.id = 'sm-taskbar';
    taskbar.style.cssText = `position:absolute;bottom:0;left:0;right:0;pointer-events:none;
      z-index:10;padding:10px 16px;background:linear-gradient(transparent,#00000088);`;
    container.appendChild(taskbar);

    // Action button (E to interact)
    const actionBtn = document.createElement('button');
    actionBtn.id = 'sm-action-btn';
    actionBtn.style.cssText = `position:absolute;bottom:60px;right:20px;z-index:20;
      background:var(--accent5);border:none;border-radius:14px;padding:14px 24px;
      color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;
      cursor:pointer;display:none;`;
    actionBtn.textContent = 'Use [E]';
    container.appendChild(actionBtn);

    // Kill button (impostor only)
    const amImp = myPeerId === impostorId || (!isOnline && impostorId === players[0]?.id);
    const killBtn = document.createElement('button');
    killBtn.id = 'sm-kill-btn';
    killBtn.style.cssText = `position:absolute;bottom:60px;left:20px;z-index:20;
      background:var(--accent1);border:none;border-radius:14px;padding:14px 24px;
      color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;
      cursor:pointer;display:${amImp?'block':'none'};`;
    killBtn.textContent = '🔪 Kill [Q]';
    container.appendChild(killBtn);

    // Report button
    const reportBtn = document.createElement('button');
    reportBtn.id = 'sm-report-btn';
    reportBtn.style.cssText = `position:absolute;bottom:110px;right:20px;z-index:20;
      background:var(--accent4);border:none;border-radius:14px;padding:12px 20px;
      color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;
      cursor:pointer;display:none;`;
    reportBtn.textContent = '🚨 Report Body';
    container.appendChild(reportBtn);

    // Emergency meeting btn
    const meetBtn = document.createElement('button');
    meetBtn.id = 'sm-meet-btn';
    meetBtn.style.cssText = `position:absolute;bottom:110px;left:20px;z-index:20;
      background:#7c3aed;border:none;border-radius:14px;padding:12px 20px;
      color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;
      cursor:pointer;`;
    meetBtn.textContent = '📣 Meeting';
    container.appendChild(meetBtn);

    // Overlay for meetings/results
    const overlay = document.createElement('div');
    overlay.id = 'sm-overlay';
    overlay.style.cssText = `position:absolute;inset:0;z-index:30;display:none;
      background:#000000cc;backdrop-filter:blur(4px);
      align-items:center;justify-content:center;`;
    container.appendChild(overlay);

    // Task mini-game overlay
    const taskOverlay = document.createElement('div');
    taskOverlay.id = 'sm-task-overlay';
    taskOverlay.style.cssText = `position:absolute;inset:0;z-index:25;display:none;
      background:#000000bb;align-items:center;justify-content:center;`;
    container.appendChild(taskOverlay);

    // Resize canvas
    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const ctx = canvas.getContext('2d');

    // ── KEYS ──
    const downHandler  = e => { keys[e.key.toLowerCase()] = true; e.preventDefault(); };
    const upHandler    = e => { keys[e.key.toLowerCase()] = false; };
    window.addEventListener('keydown', downHandler);
    window.addEventListener('keyup',   upHandler);

    // ── DRAW HELPERS ──
    function drawWalls() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0,0,W,H);
      // Floor tiles
      ctx.fillStyle = '#0f0f1e';
      for (let tx=0; tx<W; tx+=40) for (let ty=0; ty<H; ty+=40) {
        ctx.fillRect(tx+1,ty+1,38,38);
      }
      // Walls
      ctx.fillStyle = '#2a2a4a';
      WALLS.forEach(w => ctx.fillRect(w.x,w.y,w.w,w.h));
      // Accent walls
      ctx.fillStyle = '#3a3a6a';
      WALLS.forEach(w => {
        ctx.fillRect(w.x,w.y,w.w,2);
        ctx.fillRect(w.x,w.y+w.h-2,w.w,2);
      });
    }

    function drawRoomLabels() {
      ctx.font = 'bold 13px Nunito, sans-serif';
      ctx.fillStyle = '#ffffff22';
      ROOMS.forEach(r => { ctx.fillText(r.name, r.x+8, r.y+22); });
    }

    function drawTasks() {
      ALL_TASKS.forEach(t => {
        const done = tasksDone[t.id];
        const isMine = myTaskIds.includes(t.id);
        ctx.beginPath();
        ctx.arc(t.x, t.y, 12, 0, Math.PI*2);
        ctx.fillStyle = done ? '#34d39944' : isMine ? '#fbbf2488' : '#ffffff22';
        ctx.fill();
        ctx.strokeStyle = done ? '#34d399' : isMine ? '#fbbf24' : '#ffffff44';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.font = '10px Nunito,sans-serif';
        ctx.fillStyle = done?'#34d399':isMine?'#fbbf24':'#ffffff66';
        ctx.textAlign='center';
        ctx.fillText(done?'✓':t.label.split(' ')[0], t.x, t.y+4);
        ctx.textAlign='left';
      });
    }

    function drawBodies() {
      bodyPositions.forEach(b => {
        ctx.font='22px serif';
        ctx.textAlign='center';
        ctx.fillText('💀',b.x,b.y+8);
        ctx.textAlign='left';
      });
    }

    function drawPlayer(x, y, color, name, isMe, isDead) {
      if (isDead) {
        ctx.font='20px serif'; ctx.textAlign='center';
        ctx.fillText('💀',x,y+8); ctx.textAlign='left'; return;
      }
      // Shadow
      ctx.beginPath(); ctx.ellipse(x,y+14,12,4,0,0,Math.PI*2);
      ctx.fillStyle='#00000066'; ctx.fill();
      // Body
      ctx.beginPath(); ctx.arc(x,y,PLAYER_R,0,Math.PI*2);
      ctx.fillStyle = color; ctx.fill();
      // Visor
      ctx.beginPath(); ctx.arc(x-3,y-3,6,0,Math.PI*2);
      ctx.fillStyle='#ffffffcc'; ctx.fill();
      ctx.beginPath(); ctx.arc(x-3,y-3,4,0,Math.PI*2);
      ctx.fillStyle='#00aaff88'; ctx.fill();
      // Outline
      ctx.beginPath(); ctx.arc(x,y,PLAYER_R,0,Math.PI*2);
      ctx.strokeStyle = isMe?'#fff':'#ffffff66'; ctx.lineWidth=isMe?2.5:1.5; ctx.stroke();
      // Name
      ctx.font = `${isMe?'bold ':''}11px Nunito,sans-serif`;
      ctx.fillStyle='#fff'; ctx.textAlign='center';
      ctx.fillText(name,x,y-PLAYER_R-5); ctx.textAlign='left';
    }

    function worldToScreen(wx,wy) {
      return { sx: wx - cam.x, sy: wy - cam.y };
    }

    // ── COLLISION ──
    function wouldCollide(nx,ny) {
      const r = PLAYER_R;
      return WALLS.some(w =>
        nx+r > w.x && nx-r < w.x+w.w &&
        ny+r > w.y && ny-r < w.y+w.h
      );
    }

    // ── PROXIMITY CHECKS ──
    function nearbyTask() {
      if (alive[myPeerId]===false) return null;
      return ALL_TASKS.find(t =>
        !tasksDone[t.id] && myTaskIds.includes(t.id) &&
        Math.hypot(myPos.x-t.x, myPos.y-t.y) < TASK_RANGE
      ) || null;
    }

    function nearbyBody() {
      return bodyPositions.find(b =>
        Math.hypot(myPos.x-b.x, myPos.y-b.y) < TASK_RANGE*1.5
      ) || null;
    }

    function nearbyTarget() {
      const amImp = myPeerId===impostorId||(!isOnline&&impostorId===players[0]?.id);
      if (!amImp) return null;
      return players.find(p => {
        if (p.id===myPeerId||p.id===impostorId) return false;
        if (alive[p.id]===false) return false;
        const pos = p.id===myPeerId ? myPos : (otherPos[p.id]||{x:9999,y:9999});
        return Math.hypot(myPos.x-pos.x, myPos.y-pos.y) < KILL_RANGE;
      }) || null;
    }

    // ── TASK MINI-GAME ──
    function startTaskMinigame(task) {
      doingTask = {id:task.id, progress:0, start:Date.now(), dur:task.dur};
      const tov = document.getElementById('sm-task-overlay');
      tov.style.display='flex';
      tov.innerHTML=`
        <div style="background:var(--card);border:2px solid var(--accent5);
          border-radius:18px;padding:32px 48px;text-align:center;min-width:280px;">
          <div style="font-size:13px;color:var(--muted);margin-bottom:8px;">Task</div>
          <div style="font-family:'Boogaloo',cursive;font-size:32px;color:var(--accent5);">${task.label}</div>
          <div style="margin:16px auto;width:220px;height:16px;background:#333;
            border-radius:8px;overflow:hidden;">
            <div id="sm-task-prog" style="height:100%;background:var(--accent5);
              border-radius:8px;width:0%;transition:width .1s linear;"></div>
          </div>
          <div style="color:var(--muted);font-size:13px;">Hold <strong>E</strong> or tap button to complete…</div>
          <button class="btn btn-secondary" style="margin-top:16px;" onclick="cancelTask()">Cancel</button>
        </div>`;
    }

    window.cancelTask = function() {
      doingTask = null;
      document.getElementById('sm-task-overlay').style.display='none';
    };

    // ── ACTION / KILL HANDLERS ──
    function doInteract() {
      const task = nearbyTask();
      if (task && !doingTask) { startTaskMinigame(task); return; }
      const body = nearbyBody();
      if (body) { triggerMeeting('report'); return; }
    }

    function doKill() {
      const target = nearbyTarget();
      if (!target) return;
      const tpos = otherPos[target.id] || {x:0,y:0};
      alive[target.id] = false;
      bodyPositions.push({x:tpos.x, y:tpos.y, killedId:target.id});
      if (isOnline) {
        sendAction('kill', {targetId:target.id, x:tpos.x, y:tpos.y});
      } else {
        handleAction({sm:true,action:'kill',targetId:target.id,x:tpos.x,y:tpos.y});
      }
    }

    function triggerMeeting(type) {
      if (isOnline) {
        sendAction(type==='report'?'reportBody':'meeting', {callerId:myPeerId});
      } else {
        handleAction({sm:true, action:type==='report'?'reportBody':'meeting', callerId:myPeerId});
        renderOverlay();
        startVoteTimer();
      }
    }

    // wire up buttons
    actionBtn.onclick = doInteract;
    killBtn.onclick   = doKill;
    reportBtn.onclick = () => triggerMeeting('report');
    meetBtn.onclick   = () => triggerMeeting('meeting');

    // ── VOTE TIMER ──
    function startVoteTimer() {
      clearInterval(voteInterval);
      voteTimer = 45;
      voteInterval = setInterval(() => {
        if (_gameSession !== mySession) { clearInterval(voteInterval); return; }
        voteTimer--;
        const el = document.getElementById('sm-vote-timer');
        if (el) el.textContent = voteTimer + 's';
        if (voteTimer <= 0) {
          clearInterval(voteInterval);
          // force auto-vote (skip)
          if (amHost||!isOnline) {
            handleAction({sm:true,action:'vote',voterId:myPeerId,targetId:'skip'});
          }
        }
        if (isOnline && amHost) syncState();
      }, 1000);
    }

    // ── OVERLAY RENDERER (meetings/results) ──
    window.renderOverlay = function() {
      const ov = document.getElementById('sm-overlay');
      if (!ov) return;

      if (phase === 'ended') {
        const won = STATE._smResult==='crew';
        const amImp = myPeerId===impostorId||(!isOnline&&impostorId===players[0]?.id);
        const iWon  = won ? !amImp : amImp;
        ov.style.display='flex';
        ov.innerHTML=`
          <div style="background:var(--card);border:3px solid ${iWon?'var(--accent5)':'var(--accent1)'};
            border-radius:24px;padding:40px 60px;text-align:center;animation:fadeIn .3s ease;">
            <div style="font-size:64px;">${iWon?'🎉':'💀'}</div>
            <div style="font-family:'Boogaloo',cursive;font-size:44px;
              color:${won?'var(--accent5)':'var(--accent1)'};">
              ${won?'Crew Wins!':'Impostor Wins!'}
            </div>
            <div style="color:var(--muted);font-size:14px;margin-top:10px;">
              Impostor was: <strong style="color:var(--accent1);">
                ${players.find(p=>p.id===impostorId)?.name||'Unknown'}
              </strong>
            </div>
            ${STATE._smEjected ? `<div style="color:var(--muted);font-size:13px;margin-top:6px;">
              Ejected: ${players.find(p=>p.id===STATE._smEjected)?.name||'Nobody'}</div>` : ''}
            <div class="flex-center" style="gap:12px;margin-top:24px;">
              <button class="btn btn-primary" onclick="launchGame('infiltrator')">Play Again</button>
              <button class="btn btn-secondary" onclick="backToMenu()">← Games</button>
            </div>
          </div>`;
        clearInterval(voteInterval);
        return;
      }

      if (phase === 'meeting-discuss' || phase === 'meeting-vote') {
        clearInterval(voteInterval);
        if (amHost||!isOnline) startVoteTimer();
        ov.style.display='flex';
        ov.innerHTML=`
          <div style="background:var(--card);border:2px solid var(--border);
            border-radius:18px;padding:28px;max-width:560px;width:90%;
            display:flex;flex-direction:column;gap:16px;max-height:90vh;overflow-y:auto;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div style="font-family:'Boogaloo',cursive;font-size:32px;color:var(--accent1);">
                🚨 Emergency Meeting
              </div>
              <div style="font-family:'Boogaloo',cursive;font-size:28px;color:var(--accent4);"
                id="sm-vote-timer">${voteTimer}s</div>
            </div>
            <div style="color:var(--muted);font-size:13px;">Discuss then vote. Who's the impostor?</div>

            <!-- Chat log -->
            <div id="sm-chat-log" style="background:#0d0d1a;border:2px solid var(--border);
              border-radius:12px;padding:10px 14px;min-height:80px;max-height:160px;
              overflow-y:auto;display:flex;flex-direction:column;gap:6px;">
              ${chatLog.length===0
                ? '<div style="color:var(--muted);font-size:13px;font-style:italic;">No messages yet…</div>'
                : chatLog.map(m=>`
                    <div><span style="font-weight:800;color:var(--accent2);font-size:12px;">${m.name}: </span>
                    <span style="font-size:14px;">${m.text}</span></div>`).join('')}
            </div>

            <!-- Chat input -->
            <div style="display:flex;gap:8px;">
              <input id="sm-chat-input" type="text" maxlength="80" placeholder="Say something…"
                style="flex:1;background:#16162a;border:2px solid var(--border);border-radius:10px;
                  padding:10px 14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;
                  outline:none;" onkeydown="if(event.key==='Enter')smSendChat()"/>
              <button onclick="smSendChat()" class="btn btn-secondary" style="padding:10px 16px;">Send</button>
            </div>

            <!-- Vote buttons -->
            <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">
              Vote to eject:
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;">
              ${players.filter(p=>alive[p.id]!==false).map(p=>`
                <button onclick="smVote('${p.id}')"
                  style="background:${votes[myPeerId]===p.id?'var(--accent1)':'var(--card)'};
                    border:2px solid ${votes[myPeerId]===p.id?'var(--accent1)':'var(--border)'};
                    border-radius:12px;padding:12px 20px;color:var(--text);cursor:pointer;
                    font-family:'Nunito',sans-serif;font-weight:700;transition:all .2s;">
                  ${p.name}${p.id===impostorId&&phase==='ended'?' 🕵️':''}
                </button>`).join('')}
              <button onclick="smVote('skip')"
                style="background:${votes[myPeerId]==='skip'?'#444':'var(--card)'};
                  border:2px solid var(--border);border-radius:12px;padding:12px 20px;
                  color:var(--muted);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;">
                ⏭ Skip
              </button>
            </div>
          </div>`;
        // scroll chat
        setTimeout(()=>{ const c=document.getElementById('sm-chat-log'); if(c) c.scrollTop=c.scrollHeight; },0);
      }
    };

    window.smSendChat = function() {
      const inp = document.getElementById('sm-chat-input');
      const txt = inp?.value.trim();
      if (!txt) return;
      const msg = {name: STATE.playerName, text: txt};
      inp.value='';
      if (isOnline) sendAction('chat', msg);
      else { chatLog.push(msg); renderOverlay(); }
    };

    window.smVote = function(targetId) {
      if (votes[myPeerId]) return; // already voted
      votes[myPeerId] = targetId;
      if (isOnline) sendAction('vote', {voterId:myPeerId, targetId});
      else { handleAction({sm:true,action:'vote',voterId:myPeerId,targetId}); renderOverlay(); }
    };

    // ── MAIN GAME LOOP ──
    let lastSync = 0;
    let animId;

    function gameLoop(ts) {
      if (phase !== 'playing') {
        // still draw map in background, just render overlay on top
        if (phase !== 'ended') renderOverlay();
        animId = requestAnimationFrame(gameLoop);
        return;
      }

      const cw = canvas.width, ch = canvas.height;

      // ── Movement ──
      if (alive[myPeerId] !== false && !doingTask) {
        let nx = myPos.x, ny = myPos.y;
        if (keys['arrowleft']||keys['a']) nx -= SPEED;
        if (keys['arrowright']||keys['d']) nx += SPEED;
        if (keys['arrowup']||keys['w']) ny -= SPEED;
        if (keys['arrowdown']||keys['s']) ny += SPEED;
        if (!wouldCollide(nx, myPos.y)) myPos.x = Math.max(PLAYER_R, Math.min(W-PLAYER_R, nx));
        if (!wouldCollide(myPos.x, ny)) myPos.y = Math.max(PLAYER_R, Math.min(H-PLAYER_R, ny));
      }

      // ── AI movement (solo mode only) ──
      if (!isOnline) {
        players.forEach(p => {
          if (p.id === myPeerId) return;
          if (alive[p.id] === false) return;
          // Each AI has a simple wander target stored in otherPos
          if (!otherPos[p.id]) otherPos[p.id] = {x:300+Math.random()*600, y:200+Math.random()*400, alive:true, tx:0, ty:0};
          const ai = otherPos[p.id];
          // Pick new target if close or no target
          if (!ai.tx || Math.hypot(ai.x-ai.tx, ai.y-ai.ty) < 20) {
            ai.tx = 50 + Math.random() * (W - 100);
            ai.ty = 50 + Math.random() * (H - 100);
          }
          // Move toward target
          const dx = ai.tx - ai.x, dy = ai.ty - ai.y;
          const dist = Math.hypot(dx, dy);
          if (dist > 4) {
            const nx = ai.x + (dx/dist) * (SPEED * 0.8);
            const ny = ai.y + (dy/dist) * (SPEED * 0.8);
            if (!wouldCollide(nx, ai.y)) ai.x = nx;
            if (!wouldCollide(ai.x, ny)) ai.y = ny;
            else { ai.tx = 0; } // blocked, pick new target
          }
          // Impostor AI: kill nearby crew
          if (p.id === impostorId) {
            players.forEach(target => {
              if (target.id === p.id || alive[target.id] === false) return;
              const tpos = target.id === myPeerId ? myPos : (otherPos[target.id] || {x:9999,y:9999});
              if (Math.hypot(ai.x-tpos.x, ai.y-tpos.y) < KILL_RANGE) {
                if (Math.random() < 0.003) { // ~18% chance per second at 60fps
                  alive[target.id] = false;
                  bodyPositions.push({x:tpos.x, y:tpos.y, killedId:target.id});
                  // Check if impostor wins
                  const aliveCrew = players.filter(q=>q.id!==impostorId&&alive[q.id]!==false).length;
                  if (aliveCrew <= 1) { phase='ended'; STATE._smResult='impostor'; renderOverlay(); }
                }
              }
            });
          }
          // Crew AI: do tasks automatically
          if (p.id !== impostorId) {
            ALL_TASKS.forEach(t => {
              if (tasksDone[t.id]) return;
              if (Math.hypot(ai.x-t.x, ai.y-t.y) < TASK_RANGE) {
                if (Math.random() < 0.008) {
                  tasksDone[t.id] = true;
                  checkCrewWin();
                }
              }
            });
          }
        });
      }

      // ── Task progress ──
      if (doingTask && (keys['e'] || true)) {
        // auto-progress while in mini-game (press E to speed up)
        const elapsed = Date.now() - doingTask.start;
        doingTask.progress = Math.min(1, elapsed / doingTask.dur);
        const bar = document.getElementById('sm-task-prog');
        if (bar) bar.style.width = (doingTask.progress*100)+'%';
        if (doingTask.progress >= 1) {
          const tid = doingTask.id;
          doingTask = null;
          document.getElementById('sm-task-overlay').style.display='none';
          tasksDone[tid] = true;
          if (isOnline) sendAction('taskDone',{taskId:tid});
          else { handleAction({sm:true,action:'taskDone',taskId:tid}); }
        }
      }

      // ── Camera ──
      cam.x = Math.max(0, Math.min(W-cw, myPos.x - cw/2));
      cam.y = Math.max(0, Math.min(H-ch, myPos.y - ch/2));

      // ── Sync position periodically ──
      if (ts - lastSync > 50) {
        sendMyPos();
        lastSync = ts;
      }

      // ── Draw ──
      ctx.save();
      ctx.translate(-cam.x, -cam.y);

      drawWalls();
      drawRoomLabels();
      drawTasks();
      drawBodies();

      // Draw other players
      players.forEach((p,i) => {
        if (p.id === myPeerId) return;
        const pos  = otherPos[p.id] || {x:200+i*80, y:200};
        const dead = alive[p.id]===false;
        drawPlayer(pos.x, pos.y, COLORS[i%COLORS.length], p.name, false, dead);
      });

      // Draw me
      const myIdx = players.findIndex(p=>p.id===myPeerId);
      drawPlayer(myPos.x, myPos.y, COLORS[myIdx>=0?myIdx:0], STATE.playerName, true, alive[myPeerId]===false);

      ctx.restore();

      // ── HUD ──
      const hud = document.getElementById('sm-hud');
      if (hud) {
        const amImp = myPeerId===impostorId||(!isOnline&&impostorId===players[0]?.id);
        const myDone = myTaskIds.filter(id=>tasksDone[id]).length;
        const totalDone = Object.keys(tasksDone).length;
        hud.innerHTML=`
          <div style="display:flex;gap:10px;align-items:center;">
            <div style="background:#00000088;border:1px solid var(--border);border-radius:10px;
              padding:6px 12px;font-size:13px;font-weight:700;pointer-events:none;">
              ${amImp?'<span style="color:var(--accent1)">🕵️ IMPOSTOR</span>':'<span style="color:var(--accent5)">👨‍🚀 CREW</span>'}
            </div>
          </div>
          <div style="background:#00000088;border:1px solid var(--border);border-radius:10px;
            padding:6px 12px;font-size:13px;font-weight:700;pointer-events:none;">
            Tasks: ${totalDone}/${ALL_TASKS.length}
          </div>`;
      }

      // Task bar
      const tb = document.getElementById('sm-taskbar');
      if (tb) {
        const myDone = myTaskIds.filter(id=>tasksDone[id]).length;
        tb.innerHTML=`
          <div style="pointer-events:none;font-size:12px;color:var(--muted);margin-bottom:4px;">
            My tasks: ${myDone}/${myTaskIds.length}
          </div>
          <div style="display:flex;gap:6px;pointer-events:none;">
            ${myTaskIds.map(tid=>{
              const t=ALL_TASKS.find(x=>x.id===tid);
              const done=tasksDone[tid];
              const near=Math.hypot(myPos.x-(t?.x||0),myPos.y-(t?.y||0))<TASK_RANGE;
              return `<div style="background:${done?'#34d39933':near?'#fbbf2433':'#ffffff11'};
                border:1px solid ${done?'var(--accent5)':near?'var(--accent4)':'var(--border)'};
                border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;">
                ${done?'✅':'📍'} ${t?.label||tid}
              </div>`;
            }).join('')}
          </div>`;
      }

      // Contextual buttons
      const abtn = document.getElementById('sm-action-btn');
      const rbtn = document.getElementById('sm-report-btn');
      const kbtn = document.getElementById('sm-kill-btn');
      const amImp = myPeerId===impostorId||(!isOnline&&impostorId===players[0]?.id);

      if (abtn) {
        const nt = nearbyTask();
        const nb = nearbyBody();
        if (nt) { abtn.style.display='block'; abtn.textContent=`Use: ${nt.label} [E]`; }
        else    { abtn.style.display='none'; }
        if (rbtn) rbtn.style.display = nb ? 'block':'none';
      }
      if (kbtn) kbtn.style.display = (amImp && nearbyTarget()) ? 'block':'none';

      // Key shortcuts
      if (keys['e']) { keys['e']=false; doInteract(); }
      if (keys['q'] && amImp) { keys['q']=false; doKill(); }

      animId = requestAnimationFrame(gameLoop);
    }

    window._cleanup = () => {
      cancelAnimationFrame(animId);
      window.removeEventListener('keydown', downHandler);
      window.removeEventListener('keyup', upHandler);
      window.removeEventListener('resize', resizeCanvas);
      clearInterval(voteInterval);
    };

    animId = requestAnimationFrame(gameLoop);
  }

  // ── INIT ────────────────────────────────────────────────────────
  // Host randomly assigns impostor, tells guests their role
  if (amHost || !isOnline) {
    const shuffled = [...players].sort(()=>Math.random()-.5);
    impostorId = shuffled[0].id;
    players.forEach(p => { alive[p.id] = true; });
    if (isOnline) {
      broadcastGame({sm:true, action:'roleReveal',
        impostorId, alive,
        // each guest needs to know their own role; we send impostorId and they figure it out
      });
    }
    showRoleReveal();
  } else {
    // Guest: wait for host to send roleReveal
    container.innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:20px;background:#0d0d1a;">
      <div style="font-family:'Boogaloo',cursive;font-size:40px;color:var(--accent1);">🚀 Space Moles</div>
      <div style="color:var(--muted);font-size:16px;">Waiting for host to start the round…</div>
      <div style="width:40px;height:40px;border:3px solid var(--accent3);border-top-color:transparent;
        border-radius:50%;animation:spin .8s linear infinite;"></div>
      <button class="btn btn-secondary" onclick="backToMenu()">← Back</button>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>`;
    // Host will send roleReveal which triggers showRoleReveal
    window._gameDataHandler = function(data) {
      if (!data.sm) return;
      if (data.action === 'roleReveal') {
        impostorId = data.impostorId;
        alive      = data.alive || {};
        players.forEach(p=>{ if(!alive[p.id]) alive[p.id]=true; });
        showRoleReveal();
        // re-register full handler
        window._gameDataHandler = function(d) {
          if (!d.sm) return;
          if (d.action==='state') {
            const wasPlaying = phase === 'playing';
            phase=d.phase; impostorId=d.impostorId; alive=d.alive||alive;
            tasksDone=d.tasksDone||tasksDone; bodyPositions=d.bodyPositions||bodyPositions;
            chatLog=d.chatLog||chatLog; if(d.voteTimer!==undefined) voteTimer=d.voteTimer;
            if(d.playerPositions) Object.entries(d.playerPositions).forEach(([id,p])=>{ if(id!==myPeerId) otherPos[id]=p; });
            // If host just started the game, launch it on guest side too
            if (phase==='playing' && !wasPlaying) { startGame(); return; }
            if (phase!=='playing') renderOverlay();
          } else if (d.action==='pos') {
            if(d.id!==myPeerId) otherPos[d.id]={x:d.x,y:d.y,alive:d.alive};
          } else if (d.action==='startGame') {
            phase='playing'; startGame();
          }
        };
      } else if (data.action === 'startGame') {
        phase='playing'; startGame();
      }
    };
  }
}

//  GAME 3 — SKETCH RELAY (Gartic Phone style)
// ══════════════════════════════════════
// Flow: Each player gets a secret prompt → draws it in 60s →
// passes their drawing to the next player → that player guesses →
// their guess becomes the next player's prompt → repeat.
// At the end, all chains are revealed simultaneously.
// ══════════════════════════════════════
function initSketch(container) {
  const PROMPTS = [
    'A penguin riding a shopping cart down a volcano',
    'A wizard who forgot the spell and is checking Google',
    'A cat convincing a dog to do their homework',
    'Two robots arguing about pizza toppings',
    'A bear doing yoga on the moon',
    'A dinosaur stuck in a tiny elevator',
    'A superhero who is terrified of butterflies',
    'A mermaid working at a fast food drive-through',
    'A ghost trying to haunt a haunted house',
    'A pirate parrot who only speaks in haikus',
    'A cactus going on a first date',
    'A snail winning a Formula 1 race',
    'An octopus playing the drums badly',
    'A dragon who breathes ice cream instead of fire',
    'A knight fighting a vending machine',
    'A cat knocking a laptop off a desk in space',
    'A penguin in a tuxedo at a fancy restaurant',
    'A dog trying to parallel park a spaceship',
    'A banana slipping on a person',
    'A skeleton going through a car wash',
  ];

  const isOnline = STATE.mode === 'online';
  const amHost   = !isOnline || STATE.isHost;
  const myId     = amHost ? 'local' : (STATE.peer ? STATE.peer.id : 'local');
  const players  = (() => {
    if (!isOnline) return STATE.players.length >= 2 ? STATE.players
      : [{id:'local',name:STATE.playerName},{id:'p2',name:'Alex'},{id:'p3',name:'Jordan'},{id:'p4',name:'Riley'}];
    const me = {id: myId, name: STATE.playerName};
    if (amHost) {
      const guests = STATE.players.filter(p=>p.id!=='local');
      return [me, ...guests.map(p=>({id:p.id,name:p.name}))];
    }
    const list = STATE.players.length>=2 ? STATE.players.map(p=>({id:p.id,name:p.name})) : [{id:'local',name:'Host'},me];
    if (!list.find(p=>p.id===me.id)) list.push(me);
    return list;
  })();

  const N = players.length;

  // Each player has their own chain. Chain[i] starts with player i's prompt.
  // At step S, player (i + S) % N acts on chain i.
  // Steps go: prompt(0) → draw(1) → guess(2) → draw(3) → … for N total steps.
  // step 0 is already done (prompts written); steps 1..N-1 are draw/guess alternating.

  let step = 0; // 0=writing prompts, 1..N-1 = relay steps, N = reveal
  let phase = 'prompt'; // 'prompt' | 'draw' | 'guess' | 'reveal'

  // chains[chainIdx] = [{type:'word'|'draw', value, playerName}]
  let chains = Array.from({length:N}, () => []);

  // What the current player sees for their current action
  // In online mode, each player only knows their own chain segment
  let myPrompt = ''; // used during prompt phase
  let myCurrentTask = null; // {type:'draw'|'guess', value: prompt-or-imgData}

  let drawColor = '#f0f0ff';
  let drawSize  = 5;
  let canvasData = [];
  let timerInterval = null;
  let timeLeft = 60;
  let submitted = false;

  // ── Determine my player index ──
  const myIdx = players.findIndex(p => p.id === myId);

  // ── Host assigns initial prompts randomly ──
  function assignPrompts() {
    const shuffled = [...PROMPTS].sort(() => Math.random() - .5);
    players.forEach((p, i) => {
      chains[i] = [{type:'word', value: shuffled[i % shuffled.length], playerName: p.name}];
    });
  }

  if (amHost || !isOnline) assignPrompts();

  // ── Sync helpers ──
  function syncAll(extra) {
    if (!isOnline || !amHost) return;
    broadcastGame({sk:true, step, phase, chains, ...extra});
  }

  // Send only what each guest needs to know (their task for this step)
  function distributeStep() {
    if (!isOnline || !amHost) return;
    // Tell each guest what they need to do this step
    players.forEach((p, pi) => {
      if (p.id === myId) return; // host handles themselves
      const chainIdx = (pi - step + N) % N; // which chain this player works on
      const chain = chains[chainIdx];
      const lastEntry = chain[chain.length - 1];
      const conn = STATE.connections.find(c => c.peer === p.id);
      if (conn) {
        try {
          conn.send({type:'game', sk:true, action:'yourTurn',
            step, phase, chainIdx,
            task: {type: lastEntry.type==='word' ? 'draw' : 'guess', value: lastEntry.value}
          });
        } catch(e){}
      }
    });
    // Host's own task
    const hostChainIdx = (0 - step + N) % N;
    const hostChain = chains[hostChainIdx];
    const hostLast = hostChain[hostChain.length - 1];
    myCurrentTask = {type: hostLast.type==='word' ? 'draw' : 'guess', value: hostLast.value};
    submitted = false;
    timeLeft = 60;
    canvasData = [];
    startTimer();
    render();
  }

  // ── Timer ──
  const mySession = _gameSession;
  function startTimer() {
    clearInterval(timerInterval);
    if (phase === 'reveal' || phase === 'prompt') return;
    timerInterval = setInterval(() => {
      if (_gameSession !== mySession) { clearInterval(timerInterval); return; }
      timeLeft--;
      const el = document.getElementById('sk-timer');
      if (el) el.textContent = timeLeft + 's';
      if (el) el.style.color = timeLeft <= 10 ? 'var(--accent1)' : 'var(--accent4)';
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        if (!submitted) {
          // Auto-submit whatever is on canvas / empty guess
          if (myCurrentTask?.type === 'draw') skSubmitDraw(true);
          else skSubmitGuess(true);
        }
      }
    }, 1000);
  }

  // ── Peer handler ──
  window._gameDataHandler = function(data) {
    if (_gameSession !== mySession) return;
    if (!data.sk) return;

    if (amHost) {
      // Host collects submissions
      if (data.action === 'submitEntry') {
        const { playerIdx, chainIdx, entry } = data;
        chains[chainIdx].push(entry);
        checkStepComplete();
      }
    } else {
      // Guest receives instructions
      if (data.action === 'yourTurn') {
        step = data.step;
        phase = data.phase;
        myCurrentTask = data.task;
        submitted = false;
        timeLeft = 60;
        canvasData = [];
        startTimer();
        render();
      } else if (data.action === 'reveal') {
        chains = data.chains;
        phase = 'reveal';
        clearInterval(timerInterval);
        render();
      } else if (data.action === 'waitForOthers') {
        renderWaiting('✅ Submitted! Waiting for others…');
      }
    }
  };

  // ── Step completion (host only) ──
  let submissionsThisStep = 0;
  function checkStepComplete() {
    submissionsThisStep++;
    if (submissionsThisStep >= N) {
      submissionsThisStep = 0;
      step++;
      if (step >= N) {
        phase = 'reveal';
        syncAll({action:'reveal', chains});
        render();
      } else {
        phase = step % 2 === 1 ? 'draw' : 'guess';
        distributeStep();
      }
    }
  }

  // ── Submit handlers ──
  window.skSubmitDraw = function(autoSubmit=false) {
    if (submitted) return;
    submitted = true;
    clearInterval(timerInterval);
    const canvas = document.getElementById('sk-canvas');
    let imgData = '';
    if (canvas) {
      imgData = canvas.toDataURL();
    } else {
      // Build blank canvas
      const tmp = document.createElement('canvas'); tmp.width=100;tmp.height=70;
      const tc=tmp.getContext('2d');tc.fillStyle='#1a1a2e';tc.fillRect(0,0,100,70);
      imgData = tmp.toDataURL();
    }
    canvasData = [];

    const chainIdx = (myIdx - step + N) % N;
    const entry = {type:'draw', value:imgData, playerName: STATE.playerName};

    if (isOnline && !amHost) {
      broadcastGame({sk:true, action:'submitEntry', playerIdx:myIdx, chainIdx, entry});
      // Tell host to signal other guests to wait
      renderWaiting('✅ Drawing submitted! Waiting for others…');
    } else {
      chains[chainIdx].push(entry);
      // In solo mode, auto-fill other players' submissions
      if (!isOnline) {
        players.forEach((p, pi) => {
          if (p.id === myId) return;
          const ci = (pi - step + N) % N;
          const lastE = chains[ci][chains[ci].length - 1];
          const nextType = lastE.type === 'word' ? 'draw' : 'guess';
          if (nextType === 'draw') {
            const tmp=document.createElement('canvas');tmp.width=100;tmp.height=70;
            const tc=tmp.getContext('2d');tc.fillStyle='#1a1a2e';tc.fillRect(0,0,100,70);
            // draw a simple scribble
            tc.strokeStyle='#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
            tc.lineWidth=3;tc.beginPath();tc.arc(50,35,20,0,Math.PI*2);tc.stroke();
            chains[ci].push({type:'draw', value:tmp.toDataURL(), playerName:p.name});
          } else {
            const fakeGuesses=['A cat','A house','Something flying','A person','A tree','Chaos'];
            chains[ci].push({type:'word', value:fakeGuesses[Math.floor(Math.random()*fakeGuesses.length)], playerName:p.name});
          }
        });
        step++;
        if (step >= N) { phase='reveal'; render(); }
        else { phase = step%2===1?'draw':'guess'; myCurrentTask=getMyTask(); submitted=false; timeLeft=60; canvasData=[]; startTimer(); render(); }
      } else {
        checkStepComplete();
      }
    }
  };

  window.skSubmitGuess = function(autoSubmit=false) {
    if (submitted) return;
    const inp = document.getElementById('sk-guess-input');
    const v = (inp?.value.trim()) || (autoSubmit ? '???' : '');
    if (!v && !autoSubmit) { notify('Enter a guess!','error'); return; }
    submitted = true;
    clearInterval(timerInterval);

    const chainIdx = (myIdx - step + N) % N;
    const entry = {type:'word', value: v||'???', playerName: STATE.playerName};

    if (isOnline && !amHost) {
      broadcastGame({sk:true, action:'submitEntry', playerIdx:myIdx, chainIdx, entry});
      renderWaiting('✅ Guess submitted! Waiting for others…');
    } else {
      chains[chainIdx].push(entry);
      if (!isOnline) {
        players.forEach((p, pi) => {
          if (p.id === myId) return;
          const ci = (pi - step + N) % N;
          const lastE = chains[ci][chains[ci].length - 1];
          const nextType = lastE.type === 'word' ? 'draw' : 'guess';
          if (nextType === 'guess') {
            const fakeGuesses=['A cat','A rocket','A wizard','Something weird','A sandwich','Chaos'];
            chains[ci].push({type:'word', value:fakeGuesses[Math.floor(Math.random()*fakeGuesses.length)], playerName:p.name});
          } else {
            const tmp=document.createElement('canvas');tmp.width=100;tmp.height=70;
            const tc=tmp.getContext('2d');tc.fillStyle='#1a1a2e';tc.fillRect(0,0,100,70);
            tc.strokeStyle='#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
            tc.lineWidth=3;tc.beginPath();tc.arc(50,35,20,0,Math.PI*2);tc.stroke();
            chains[ci].push({type:'draw', value:tmp.toDataURL(), playerName:p.name});
          }
        });
        step++;
        if (step >= N) { phase='reveal'; render(); }
        else { phase = step%2===1?'draw':'guess'; myCurrentTask=getMyTask(); submitted=false; timeLeft=60; canvasData=[]; startTimer(); render(); }
      } else {
        checkStepComplete();
      }
    }
  };

  function getMyTask() {
    const chainIdx = (myIdx - step + N) % N;
    const chain = chains[chainIdx];
    const lastEntry = chain[chain.length - 1];
    return {type: lastEntry.type==='word' ? 'draw' : 'guess', value: lastEntry.value};
  }

  // ── Toolbar actions ──
  window.skSetColor = c => { drawColor=c; if(phase==='draw') renderDraw(); };
  window.skSetSize  = s => { drawSize=s; if(phase==='draw') renderDraw(); };
  window.skClearCanvas = () => { canvasData=[]; if(phase==='draw') renderDraw(); };

  // ── Render ──
  function render() {
    if (phase === 'prompt') { renderPromptPhase(); return; }
    if (phase === 'reveal') { clearInterval(timerInterval); renderReveal(); return; }
    if (!myCurrentTask) { renderWaiting('⏳ Waiting for host to start…'); return; }
    if (submitted) { renderWaiting('✅ Submitted! Waiting for others…'); return; }
    if (myCurrentTask.type === 'draw') renderDraw();
    else renderGuess();
  }

  function renderPromptPhase() {
    // In this implementation, host auto-assigns prompts and skips the manual prompt phase
    // Move straight to step 1
    step = 1;
    phase = 'draw';
    if (amHost || !isOnline) {
      myCurrentTask = getMyTask();
      submitted = false;
      timeLeft = 60;
      canvasData = [];
      if (isOnline) distributeStep();
      else startTimer();
      render();
    }
  }

  function renderWaiting(msg) {
    container.innerHTML = `
    <div class="sk-wrap">
      <div class="sk-title">🎨 Sketch Relay</div>
      <div style="background:var(--card);border:2px solid var(--border);border-radius:18px;
        padding:48px 40px;text-align:center;max-width:480px;width:100%;">
        <div style="font-size:40px;margin-bottom:14px;">⏳</div>
        <div style="font-family:'Boogaloo',cursive;font-size:22px;color:var(--accent2);">${msg}</div>
        <div style="color:var(--muted);font-size:13px;margin-top:10px;">
          Step ${step} of ${N-1} · ${N} players

    });
    let px,py,pen=false;
    function pt(e){const r=canvas.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return[s.clientX-r.left,s.clientY-r.top];}
    canvas.onmousedown=e=>{pen=true;[px,py]=pt(e);};

function initBrawl(container) {

  const isOnline = STATE.mode === 'online';

    if (!isOnline) return STATE.players.length >= 2 ? STATE.players
      : [{id:'local',name:STATE.playerName},{id:'p2',name:'Player 2'},{id:'p3',name:'Player 3'}];
    const me = {id:myId, name:STATE.playerName};
    if (amHost) {
      const guests = STATE.players.filter(p=>p.id!=='local');
      return [me, ...guests.map(p=>({id:p.id,name:p.name}))];
    }
    const list = STATE.players.length>=2 ? STATE.players.map(p=>({id:p.id,name:p.name})) : [{id:'local',name:'Host'},me];

  })();

      special:'doubleJump', specialDesc:'Extra midair jump',

    {
      id:'ninja', name:'Ninja', emoji:'🥷', color:'#34d399',

      speed:4.5, weight:0.85, jumpPow:13, atkRange:48, atkDmg:9,
      special:'teleport', specialDesc:'Teleport to opponent',
    },
    {
      id:'wizard', name:'Wizard', emoji:'🧙', color:'#ff4f7b',

      special:'blast', specialDesc:'Ranged magic projectile',
    },
    {
      id:'brawler', name:'Brawler', emoji:'🥊', color:'#f97316',
      desc:'Strong combo attacks',
      speed:3.8, weight:1.1, jumpPow:12, atkRange:60, atkDmg:12,
      special:'combo', specialDesc:'3-hit rapid combo',
    },
  ];

  // ── MAPS ───────────────────────────────────────────────────────
  const MAPS = [
    {
      id:'final', name:'Final Destination', emoji:'🌌',
      bg: ['#0a0015','#1a0040'],
      platforms: [], // just the main stage
      stageColor: '#6d28d9', stageGlow: '#a78bfa',
    },
    {
      id:'castle', name:'Sky Castle', emoji:'🏰',
      bg: ['#001a3a','#003080'],
      platforms: [{x:.3,y:.55,w:.18},{x:.52,y:.55,w:.18}],
      stageColor: '#1e40af', stageGlow: '#4fc3f7',
    },
    {
      id:'volcano', name:'Volcano', emoji:'🌋',
      bg: ['#1a0500','#3d0f00'],
      platforms: [{x:.15,y:.6,w:.15},{x:.7,y:.6,w:.15},{x:.4,y:.45,w:.2}],
      stageColor: '#dc2626', stageGlow: '#ff4f7b',
    },
    {
      id:'cloud', name:'Cloud Kingdom', emoji:'☁️',
      bg: ['#001428','#002a5a'],
      platforms: [{x:.1,y:.5,w:.22},{x:.68,y:.5,w:.22},{x:.37,y:.35,w:.26}],
      stageColor: '#0ea5e9', stageGlow: '#7dd3fc',
    },
  ];

  // ── LOBBY STATE ────────────────────────────────────────────────
  let lobbyPhase = 'char-select'; // 'char-select' | 'map-select' | 'countdown' | 'playing'
  let selections = {};   // playerId → charId
  let mapChoice  = null;
  let readySet   = new Set(); // playerIds who hit ready
  let countdownN = 3;
  let countdownInterval = null;

  // ── GAME STATE ─────────────────────────────────────────────────
  let fighters = [];
  let platforms = [];
  let particles = [];
  let projectiles = [];
  let gameOver = false, winner = null;
  let stocks = {}; // playerId → lives remaining (3 each)

  const GRAVITY = 0.55, STOCK_COUNT = 3;

  // ── PEER SYNC ──────────────────────────────────────────────────
  function syncLobby(extra) {
    if (!isOnline||!amHost) return;
    broadcastGame({br:true, lobbyPhase, selections, mapChoice, readySet:[...readySet], ...extra});
  }
  function syncGame() {
    if (!isOnline||!amHost) return;
    broadcastGame({br:true, lobbyPhase:'playing',
      fighters: fighters.map(f=>({
        id:f.id,x:f.x,y:f.y,vx:f.vx,vy:f.vy,pct:f.pct,
        alive:f.alive,facing:f.facing,atkTimer:f.atkTimer,hurtTimer:f.hurtTimer,
        airJumps:f.airJumps,onGround:f.onGround,
      })),
      stocks, particles: particles.slice(-30),
      projectiles: projectiles.map(p=>({x:p.x,y:p.y,vx:p.vx,vy:p.vy,color:p.color,ownerId:p.ownerId})),
      gameOver, winnerId: winner?.id||null,
    });
  }

  let lastSync = 0;
  const keys = {};
  const kd = e => { keys[e.key.toLowerCase()] = true; e.preventDefault(); };
  const ku = e => { keys[e.key.toLowerCase()] = false; };
  window.addEventListener('keydown', kd);
  window.addEventListener('keyup',   ku);

  window._gameDataHandler = function(data) {
    if (!data.br) return;
    if (amHost) {
      // Guest → host messages
      if (data.action==='selectChar') {
        selections[data.id] = data.charId;
        syncLobby();
        if (lobbyPhase==='char-select') renderLobby();
      } else if (data.action==='selectMap') {
        mapChoice = data.mapId; syncLobby();
        if (lobbyPhase==='map-select') renderLobby();
      } else if (data.action==='ready') {
        readySet.add(data.id);
        syncLobby();
        if (lobbyPhase==='char-select'||lobbyPhase==='map-select') renderLobby();
        checkAllReady();
      } else if (data.action==='unready') {
        readySet.delete(data.id); syncLobby(); renderLobby();
      } else if (data.action==='input') {
        const f = fighters.find(x=>x.id===data.id);
        if (!f||!f.alive) return;
        applyInput(f, data);
      }
    } else {
      // Host → guest
      if (data.lobbyPhase) {
        const prev = lobbyPhase;
        lobbyPhase = data.lobbyPhase;
        if (data.selections) selections = data.selections;
        if (data.mapChoice !== undefined) mapChoice = data.mapChoice;
        if (data.readySet) { readySet = new Set(data.readySet); }
        if (data.countdown !== undefined) { countdownN = data.countdown; renderLobby(); return; }
        if (lobbyPhase==='playing' && prev!=='playing') {
          startGame(); return;
        }
        if (lobbyPhase!=='playing') { renderLobby(); return; }
      }
      if (data.fighters) {
        data.fighters.forEach(fd=>{
          const f=fighters.find(x=>x.id===fd.id);
          if(f) Object.assign(f,fd);
        });
      }
      if (data.stocks) stocks = data.stocks;
      if (data.projectiles) {
        projectiles = data.projectiles.map(p=>({...p,r:8}));
      }
      if (data.gameOver && !gameOver) {
        gameOver=true;
        winner = fighters.find(f=>f.id===data.winnerId)||null;
        setTimeout(showResult, 1000);
      }
    }
  };

  function checkAllReady() {
    if (!amHost && !isOnline) return;
    if (lobbyPhase === 'char-select') {
      if (players.every(p => selections[p.id] && readySet.has(p.id))) {
        lobbyPhase = 'map-select';
        readySet.clear();
        syncLobby();
        renderLobby();
      }
    } else if (lobbyPhase === 'map-select') {
      if (mapChoice && players.every(p => readySet.has(p.id))) {
        startCountdown();
      }
    }
  }

  function startCountdown() {
    lobbyPhase = 'countdown';
    countdownN = 3;
    syncLobby({countdown:countdownN});
    renderLobby();
    countdownInterval = setInterval(() => {
      countdownN--;
      if (countdownN <= 0) {
        clearInterval(countdownInterval);
        lobbyPhase = 'playing';
        syncLobby();
        startGame();
      } else {
        syncLobby({countdown:countdownN});
        renderLobby();
      }
    }, 1000);
  }
