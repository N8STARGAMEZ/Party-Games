      const isChooser = amHost || !isOnline;
      container.innerHTML = `
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;
        gap:20px;padding:24px 16px;background:radial-gradient(ellipse at 50% 0%,#001030,#0d0d1a);">
        <div style="font-family:'Boogaloo',cursive;font-size:36px;color:var(--accent2);">🗺️ Pick a Stage</div>
        <div style="font-size:13px;color:var(--muted);">
          ${players.map(p=>`<span style="color:${CHARACTERS.find(c=>c.id===selections[p.id])?.color||'#fff'};">
            ${CHARACTERS.find(c=>c.id===selections[p.id])?.emoji||'?'} ${p.name}</span>`).join(' &nbsp;vs&nbsp; ')}
        </div>

        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:560px;width:100%;">
          ${MAPS.map(m=>`
            <div onclick="${isChooser?`brSelectMap('${m.id}')`:''}">
              <div style="background:linear-gradient(135deg,${m.bg[0]},${m.bg[1]});
                border:3px solid ${mapChoice===m.id?m.stageGlow:'var(--border)'};
                border-radius:16px;padding:20px;cursor:${isChooser?'pointer':'default'};text-align:center;
                transition:all .2s;${mapChoice===m.id?'box-shadow:0 0 24px '+m.stageGlow+'66;':''}">
                <div style="font-size:40px;margin-bottom:8px;">${m.emoji}</div>
                <div style="font-family:'Boogaloo',cursive;font-size:20px;color:${m.stageGlow};">${m.name}</div>
                <div style="font-size:11px;color:var(--muted);margin-top:4px;">
                  ${m.platforms.length===0?'Flat stage':m.platforms.length+' platforms'}
                </div>
              </div>
            </div>`).join('')}
        </div>

        ${isChooser && mapChoice ? `
          <button class="btn btn-success" onclick="brReadyMap()" ${readySet.has(myId)?'disabled style="opacity:.5"':''}>
            ${readySet.has(myId)?'✅ Ready!':'Start Battle ▶'}
          </button>` : !isChooser ? `<div style="color:var(--muted);font-size:14px;">Waiting for host to pick map…</div>` : `<div style="color:var(--muted);font-size:14px;">Select a stage above</div>`}
        ${!isChooser && mapChoice ? `
          <button class="btn btn-primary" onclick="brReadyMap()" ${readySet.has(myId)?'disabled style="opacity:.5"':''}>
            ${readySet.has(myId)?'✅ Ready!':'Ready ▶'}
          </button>` : ''}
        <div style="font-size:13px;color:var(--muted);">${[...readySet].length}/${players.length} ready</div>
        <button class="btn btn-secondary" onclick="backToMenu()">← Back</button>
      </div>`;
    }
  }

  window.brSelectChar = function(charId) {
    selections[myId] = charId;
    readySet.delete(myId);
    if (isOnline && !amHost) broadcastGame({br:true, action:'selectChar', id:myId, charId});
    else if (isOnline && amHost) syncLobby();
    renderLobby();
  };
  window.brReady = function() {
    if (!selections[myId]) return;
    readySet.add(myId);
    if (isOnline && !amHost) broadcastGame({br:true, action:'ready', id:myId});
    else if (isOnline && amHost) { syncLobby(); checkAllReady(); }
    else checkAllReady();
    renderLobby();
  };
  window.brSelectMap = function(mapId) {
    if (!amHost && isOnline) return;
    mapChoice = mapId;
    if (isOnline) syncLobby();
    renderLobby();
  };
  window.brReadyMap = function() {
    if (!mapChoice) return;
    readySet.add(myId);
    if (isOnline && !amHost) broadcastGame({br:true, action:'ready', id:myId});
    else if (isOnline && amHost) { syncLobby(); checkAllReady(); }
    else checkAllReady();
    renderLobby();
  };

  // ── GAME START ─────────────────────────────────────────────────
  function startGame() {
    const map  = MAPS.find(m=>m.id===mapChoice) || MAPS[0];
    container.innerHTML = '';
    container.style.background = map.bg[0];
    container.style.position   = 'relative';
    container.style.overflow   = 'hidden';

    const canvas = document.createElement('canvas');
    canvas.style.cssText = 'position:absolute;top:0;left:0;display:block;';
    container.appendChild(canvas);

    const W = canvas.width  = window.innerWidth;
    const H = canvas.height = window.innerHeight;

    // Build platforms from map definition
    const MAIN_Y = H * 0.73;
    platforms = [
      {x: W*0.1, y: MAIN_Y, w: W*0.8, h: 18, main: true},
      ...map.platforms.map(p=>({x:W*p.x, y:H*p.y, w:W*p.w, h:12, main:false}))
    ];

    // Init fighters
    players.forEach((p,i) => {
      const ch = CHARACTERS.find(c=>c.id===selections[p.id]) || CHARACTERS[i%CHARACTERS.length];
      stocks[p.id] = STOCK_COUNT;
      fighters.push({
        id: p.id, name: p.name,
        char: ch, color: ch.color, emoji: ch.emoji,
        x: W*(0.25+i*0.25), y: MAIN_Y-60,
        vx:0, vy:0, pct:0, // damage percent (like smash)
        alive:true, onGround:false,
        facing: i===0?1:-1,
        atkTimer:0, hurtTimer:0, specialCooldown:0,
        airJumps: ch.id==='bouncer'?1:0, // extra midair jumps
        comboCount:0, lastAttackTime:0,
      });
    });

    const ctx = canvas.getContext('2d');

    // ── PHYSICS ──
    function applyInput(f, inp) {
      if (!f.alive || f.hurtTimer > 4) return;
      const ch = f.char;
      if (inp.left)  { f.vx -= ch.speed * 0.22; f.facing = -1; }
      if (inp.right) { f.vx += ch.speed * 0.22; f.facing = 1; }

      // Jump: ground jump or air jump (bouncer)
      if (inp.jump) {
        if (f.onGround) {
          f.vy = -ch.jumpPow; f.onGround = false;
        } else if (f.airJumps > 0) {
          f.vy = -ch.jumpPow * 0.85; f.airJumps--;
        }
      }

      if (inp.atk && f.atkTimer === 0) {
        f.atkTimer = ch.id==='brawler' ? 10 : 22;
        doAttack(f);
      }
      if (inp.special && f.specialCooldown === 0) {
        doSpecial(f);
        f.specialCooldown = 90;
      }
    }

    function doAttack(f) {
      const ch = f.char;
      if (ch.id === 'wizard') {
        // Ranged projectile
        projectiles.push({
          x: f.x + f.facing*20, y: f.y,
          vx: f.facing*11, vy: 0,
          dmg: ch.atkDmg, kb: 4, ownerId: f.id,
          color: ch.color, r: 8, life: 60,
        });
        addParticles(f.x, f.y, ch.color, 5);
        return;
      }
      if (ch.id === 'brawler') {
        // 3-hit combo window
        f.comboCount = (Date.now()-f.lastAttackTime < 600) ? (f.comboCount+1)%3 : 0;
        f.lastAttackTime = Date.now();
      }
      fighters.forEach(enemy => {
        if (enemy.id===f.id||!enemy.alive) return;
        const dx = enemy.x-f.x, dy = enemy.y-f.y;
        const range = ch.id==='brawler' && f.comboCount===2 ? ch.atkRange*1.3 : ch.atkRange;
        if (Math.abs(dx) < range && dx*f.facing > -10 && Math.abs(dy) < 50) {
          hitEnemy(f, enemy);
        }
      });
    }

    function doSpecial(f) {
      const ch = f.char;
      addParticles(f.x, f.y, ch.color, 12);
      if (ch.id==='speedy') {
        // Dash hit
        f.vx = f.facing * 18;
        f.vy = -3;
        setTimeout(()=>{ fighters.forEach(e=>{ if(e.id!==f.id&&e.alive){
          const dx=e.x-f.x; if(Math.abs(dx)<70&&Math.abs(e.y-f.y)<40) hitEnemy(f,e,1.4);
        }}); }, 80);
      } else if (ch.id==='tank') {
        // Ground slam — damages nearby on landing
        f.vy = 18; f.vx = 0;
        const checkSlam = setInterval(()=>{
          if(f.onGround){
            clearInterval(checkSlam);
            fighters.forEach(e=>{ if(e.id!==f.id&&e.alive){
              const dx=e.x-f.x; if(Math.abs(dx)<110&&Math.abs(e.y-f.y)<60) hitEnemy(f,e,1.3);
            }});
            addParticles(f.x, f.y+10, ch.color, 20);
          }
        }, 16);
      } else if (ch.id==='bouncer') {
        // Restore air jump + upward slam
        f.airJumps = 1; f.vy = -19;
        fighters.forEach(e=>{ if(e.id!==f.id&&e.alive){
          const dx=e.x-f.x,dy=e.y-f.y;
          if(Math.abs(dx)<70&&Math.abs(dy)<50) hitEnemy(f,e,0.9);
        }});
      } else if (ch.id==='ninja') {
        // Teleport to nearest enemy + hit
        let nearest=null, nd=9999;
        fighters.forEach(e=>{ if(e.id!==f.id&&e.alive){
          const d=Math.hypot(e.x-f.x,e.y-f.y);
          if(d<nd){nd=d;nearest=e;}
        }});
        if(nearest){
          addParticles(f.x, f.y, ch.color, 8);
          f.x = nearest.x - f.facing*60; f.y = nearest.y;
          addParticles(f.x, f.y, ch.color, 8);
          hitEnemy(f, nearest, 1.1);
        }
      } else if (ch.id==='wizard') {
        // Big blast
        projectiles.push({x:f.x+f.facing*20,y:f.y,vx:f.facing*7,vy:-2,
          dmg:ch.atkDmg*2,kb:7,ownerId:f.id,color:'#fff',r:16,life:80});
      } else if (ch.id==='brawler') {
        // Rapid 3 hits
        [0,120,240].forEach((delay,i)=>{
          setTimeout(()=>{
            fighters.forEach(e=>{ if(e.id!==f.id&&e.alive){
              const dx=e.x-f.x;
              if(Math.abs(dx)<ch.atkRange&&Math.abs(e.y-f.y)<50&&dx*f.facing>-10) hitEnemy(f,e,0.6);
            }});
            addParticles(f.x+f.facing*30, f.y, ch.color, 4);
          }, delay);
        });
      }
    }

    // SMash-style knockback: scales with pct
    function hitEnemy(attacker, enemy, mult=1) {
      const ch = attacker.char;
      const baseDmg = ch.atkDmg * mult;
      enemy.pct += baseDmg;
      enemy.hurtTimer = 18;

      // Knockback: base + pct-scaling (like Smash Bros)
      const kbScale = (enemy.pct / 100) * 1.4 + 0.5;
      const weight  = enemy.char.weight;
      const kbX = attacker.facing * (5 + baseDmg * 0.3) * kbScale / weight;
      const kbY = -(3 + baseDmg * 0.2) * kbScale / weight;
      enemy.vx += kbX;
      enemy.vy += kbY;

      addParticles(enemy.x, enemy.y, enemy.char.color, 8);

      // Lose a stock when launched off screen (handled in update)
    }

    function update() {
      if (gameOver) return;
      const myF = fighters.find(f=>f.id===myId);

      // Apply my own inputs
      if (myF && myF.alive) {
        const jump  = keys['w']||keys['arrowup']||keys[' '];
        const left  = keys['a']||keys['arrowleft'];
        const right = keys['d']||keys['arrowright'];
        const atk   = keys['f']||keys['l']||keys['j'];
        const spec  = keys['g']||keys['k']||keys['shift'];

        if (amHost||!isOnline) {
          applyInput(myF, {left,right,jump,atk,spec});
        }

        if (isOnline && !amHost) {
          broadcastGame({br:true,action:'input',id:myId,left,right,jump,atk,spec});
          // Also apply locally for responsiveness
          applyInput(myF, {left,right,jump,atk,spec});
        }
      }

      // Physics
      if (amHost||!isOnline) {
        fighters.forEach(f => {
          if (!f.alive) return;
          const ch = f.char;

          // Friction + gravity
          f.vx *= f.onGround ? 0.78 : 0.92;
          f.vy += GRAVITY;
          f.x += f.vx; f.y += f.vy;
          if (f.atkTimer>0) f.atkTimer--;
          if (f.hurtTimer>0) f.hurtTimer--;
          if (f.specialCooldown>0) f.specialCooldown--;

          // Platform collisions
          f.onGround = false;
          platforms.forEach(plat => {
            if (f.vy>=0 && f.y+16>plat.y && f.y+16<plat.y+plat.h+Math.abs(f.vy)+4
              && f.x>plat.x-10 && f.x<plat.x+plat.w+10) {
              f.y = plat.y-16; f.vy=0; f.onGround=true;
              // Restore air jumps on landing
              if (ch.id==='bouncer') f.airJumps=1;
              else f.airJumps=0;
            }
          });

          // Wall clamp (soft)
          if (f.x < -80) f.vx += 3;
          if (f.x > W+80) f.vx -= 3;

          // Blast zone — lose a stock
          if (f.y > H+120 || f.y < -300 || f.x < -200 || f.x > W+200) {
            stocks[f.id]--;
            addParticles(f.x > W/2 ? W-50 : 50, H/2, f.char.color, 25);
            if (stocks[f.id] <= 0) {
              f.alive = false;
            } else {
              // Respawn
              f.x = W/2 + (Math.random()-0.5)*100;
              f.y = -60; f.vx=0; f.vy=0; f.pct=0;
              f.hurtTimer = 60; // brief invincibility
            }
          }
        });

        // Projectiles
        projectiles.forEach(p => {
          p.x += p.vx; p.y += p.vy; p.vy += 0.08;
          p.life--;
          fighters.forEach(f => {
            if (f.id===p.ownerId||!f.alive) return;
            if (Math.hypot(f.x-p.x, f.y-p.y)<p.r+14) {
              const shooter = fighters.find(x=>x.id===p.ownerId);
              if (shooter) hitEnemy(shooter, f, 1);
              p.life = 0;
            }
          });
        });
        projectiles = projectiles.filter(p=>p.life>0);

        // Particles
        particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.life-=.03;});
        particles = particles.filter(p=>p.life>0);

        // Check win
        const aliveF = fighters.filter(f=>f.alive);
        if (aliveF.length<=1 && !gameOver) {
          gameOver=true; winner=aliveF[0]||null;
          syncGame();
          setTimeout(showResult,1400);
        }
      }
    }

    function draw() {
      ctx.clearRect(0,0,W,H);

      // Sky bg gradient
      const bgGrad = ctx.createLinearGradient(0,0,0,H);
      bgGrad.addColorStop(0, map.bg[0]);
      bgGrad.addColorStop(1, map.bg[1]);
      ctx.fillStyle = bgGrad; ctx.fillRect(0,0,W,H);

      // Stars
      ctx.fillStyle='#ffffff18';
      for(let i=0;i<80;i++){
        const sx=(i*137.5+map.bg[0].length)%W, sy=(i*73)%H;
        ctx.beginPath();ctx.arc(sx,sy,i%3<1?1.5:0.8,0,Math.PI*2);ctx.fill();
      }

      // Platforms
      platforms.forEach(plat => {
        const g = ctx.createLinearGradient(plat.x,plat.y,plat.x,plat.y+plat.h);
        g.addColorStop(0, map.stageColor); g.addColorStop(1, map.bg[1]);
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.roundRect(plat.x,plat.y,plat.w,plat.h,plat.main?8:6); ctx.fill();
        ctx.strokeStyle = map.stageGlow; ctx.lineWidth = 2;
        ctx.shadowBlur=14; ctx.shadowColor=map.stageGlow; ctx.stroke(); ctx.shadowBlur=0;
        // Top edge highlight
        ctx.fillStyle = map.stageGlow+'66';
        ctx.fillRect(plat.x+4,plat.y,plat.w-8,3);
      });

      // Particles
      particles.forEach(p=>{
        ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fill();
      }); ctx.globalAlpha=1;

      // Projectiles
      projectiles.forEach(p=>{
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=p.color+'cc'; ctx.fill();
        ctx.strokeStyle=p.color; ctx.lineWidth=2;
        ctx.shadowBlur=10; ctx.shadowColor=p.color; ctx.stroke(); ctx.shadowBlur=0;
      });

      // Fighters
      fighters.forEach(f => {
        if (!f.alive) return;
        const ch = f.char;
        const hurt = f.hurtTimer>0;
        const atking = f.atkTimer > (ch.id==='brawler'?5:10);
        const inv = f.hurtTimer>30; // respawn invincibility flash
        if (inv && Math.floor(Date.now()/80)%2===0) return;

        ctx.save(); ctx.translate(f.x, f.y);

        // Shadow
        ctx.fillStyle='#00000033';
        ctx.beginPath(); ctx.ellipse(0,18,18,5,0,0,Math.PI*2); ctx.fill();

        // Body
        const wobble = Math.sin(Date.now()*0.012 + f.id.charCodeAt(0)) * 2.5;
        ctx.fillStyle = hurt?'#fff':ch.color;
        ctx.beginPath();
        ctx.ellipse(0,0,20+wobble*0.4,24-wobble*0.3,0,0,Math.PI*2); ctx.fill();
        // Shine
        ctx.fillStyle='rgba(255,255,255,0.25)';
        ctx.beginPath(); ctx.ellipse(-5,-7,6,4,-0.4,0,Math.PI*2); ctx.fill();
        // Eyes
        ctx.fillStyle='#000';
        ctx.beginPath(); ctx.arc(f.facing*6,-3,4,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(f.facing*6+1,-4,2,0,Math.PI*2); ctx.fill();
        // Mouth
        ctx.strokeStyle='#000'; ctx.lineWidth=2;
        ctx.beginPath();
        if(hurt) ctx.arc(0,5,5,0,Math.PI);
        else if(atking) { ctx.moveTo(-4,4); ctx.lineTo(4,4); }
        else ctx.arc(0,3,5,Math.PI,0);
        ctx.stroke();
        // Attack arm
        if(atking){
          ctx.fillStyle=ch.color;
          ctx.beginPath();
          ctx.ellipse(f.facing*30,0,14,8,.25*f.facing,0,Math.PI*2); ctx.fill();
        }
        // Character emoji indicator
        ctx.font='14px serif'; ctx.textAlign='center';
        ctx.fillText(ch.emoji, 0, -30);
        // Name
        ctx.font='bold 10px Nunito,sans-serif'; ctx.fillStyle='#fff';
        ctx.fillText(f.name, 0, -44);
        ctx.textAlign='left';

        ctx.restore();
      });

      // HUD — stock/percent display at bottom
      const hudH = 70;
      ctx.fillStyle='#00000066';
      ctx.fillRect(0,H-hudH,W,hudH);

      fighters.forEach((f,i) => {
        const ch=f.char;
        const slotW = W/fighters.length;
        const cx = slotW*i + slotW/2;
        const cy = H-hudH/2;

        // Character icon
        ctx.font='20px serif'; ctx.textAlign='center';
        ctx.globalAlpha=f.alive?1:0.35;
        ctx.fillText(ch.emoji, cx, cy-8);

        // Damage %
        const pctColor = f.pct>150?'#ff4f7b':f.pct>80?'#fbbf24':'#fff';
        ctx.font=`bold ${f.alive?22:16}px Boogaloo,cursive`;
        ctx.fillStyle=pctColor;
        ctx.fillText(f.alive?Math.floor(f.pct)+'%':'✖', cx, cy+18);
        ctx.globalAlpha=1;

        // Stocks (hearts)
        const s = stocks[f.id]||0;
        for(let j=0;j<STOCK_COUNT;j++){
          ctx.font='10px serif';
          ctx.fillText(j<s?'❤️':'🖤', cx-12+j*14, cy-22);
        }

        // Name
        ctx.font='bold 10px Nunito,sans-serif'; ctx.fillStyle=ch.color;
        ctx.fillText(f.name, cx, cy-36);
        ctx.textAlign='left';
      });

      // Blast zone warning
      fighters.forEach(f=>{
        if(!f.alive) return;
        if(f.x<100||f.x>W-100||f.y<80){
          ctx.save();
          ctx.strokeStyle=f.char.color; ctx.lineWidth=3; ctx.globalAlpha=0.6;
          // Arrow pointing to fighter
          const arrowX=Math.max(20,Math.min(W-20,f.x));
          const arrowY=f.y<80?10:H-80;
          ctx.beginPath();ctx.moveTo(arrowX,arrowY);ctx.lineTo(arrowX-8,arrowY+12);ctx.moveTo(arrowX,arrowY);ctx.lineTo(arrowX+8,arrowY+12);
          ctx.stroke(); ctx.restore();
        }
      });
    }

    function showResult() {
      const ov = document.createElement('div');
      ov.style.cssText=`position:absolute;inset:0;background:#000000bb;backdrop-filter:blur(4px);
        display:flex;align-items:center;justify-content:center;z-index:30;`;
      const wc = winner?.char;
      ov.innerHTML=`
        <div style="background:var(--card);border:3px solid ${wc?.color||'var(--border)'};
          border-radius:24px;padding:40px 60px;text-align:center;animation:fadeIn .4s ease;
          box-shadow:0 0 60px ${wc?.color||'transparent'}44;">
          <div style="font-size:64px;">${wc?.emoji||'💥'}</div>
          <div style="font-family:'Boogaloo',cursive;font-size:44px;color:${wc?.color||'var(--text)'};">
            ${winner?winner.name+' Wins!':'Draw!'}
          </div>
          ${winner?`<div style="font-size:14px;color:var(--muted);margin-top:6px;">
            ${wc?.name} · ${Math.floor(winner.pct)}% damage taken
          </div>`:''}
          <div style="display:flex;gap:12px;justify-content:center;margin-top:28px;">
            <button class="btn btn-primary" onclick="launchGame('brawl')">Play Again</button>
            <button class="btn btn-secondary" onclick="backToMenu()">← Games</button>
          </div>
        </div>`;
      container.appendChild(ov);
    }

    let animId; let lastSyncTs=0;
    function loop(ts) {
      update(); draw();
      if((amHost||!isOnline)&&ts-lastSyncTs>50){syncGame();lastSyncTs=ts;}
      animId=requestAnimationFrame(loop);
    }
    loop(0);
    window._cleanup=()=>{
      cancelAnimationFrame(animId);
      window.removeEventListener('keydown',kd);
      window.removeEventListener('keyup',ku);
      clearInterval(countdownInterval);
    };
  }

  function addParticles(x,y,color,n=8){
    for(let i=0;i<n;i++)
      particles.push({x,y,vx:(Math.random()-.5)*7,vy:(Math.random()-1.5)*6,life:1,color});
  }

  // ── BOOT ──────────────────────────────────────────────────────
  lobbyPhase = 'char-select';
  renderLobby();
  if (isOnline && amHost) syncLobby();
}
