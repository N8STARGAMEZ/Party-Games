//  GAME 5 — WHO'S THE LIAR
// ══════════════════════════════════════
function initLiar(container) {
  const CATEGORIES = {
    'Animals':   ['Elephant','Penguin','Giraffe','Dolphin','Octopus','Cheetah','Platypus','Flamingo'],
    'Foods':     ['Spaghetti','Guacamole','Croissant','Sushi','Taco','Lasagna','Dumplings','Paella'],
    'Sports':    ['Basketball','Fencing','Curling','Polo','Lacrosse','Badminton','Kayaking','Archery'],
    'Movies':    ['Inception','Cluedo','Titanic','Avatar','Matilda','Beetlejuice','Coraline','Interstellar'],
    'Countries': ['Mongolia','Uruguay','Iceland','Tanzania','Bhutan','Luxembourg','Paraguay','Cambodia'],
  };

  const isOnline = STATE.mode === 'online';
  const amHost   = !isOnline || STATE.isHost;
  const myId     = amHost ? 'local' : (STATE.peer ? STATE.peer.id : 'local');
  const players  = (() => {
    if (!isOnline) return STATE.players.length >= 2 ? STATE.players
      : [{id:'local',name:STATE.playerName},{id:'p2',name:'Player 2'},{id:'p3',name:'Player 3'}];
    const me = {id: myId, name: STATE.playerName};
    if (amHost) {
      const guests = STATE.players.filter(p=>p.id!=='local');
      return [me, ...guests.map(p=>({id:p.id,name:p.name}))];
    }
    const list = STATE.players.length>=2 ? STATE.players.map(p=>({id:p.id,name:p.name})) : [{id:'local',name:'Host'},me];
    if (!list.find(p=>p.id===me.id)) list.push(me);
    return list;
  })();

  // Host picks category/word/liar and sends to all
  const cats = Object.keys(CATEGORIES);
  let cat='', secretWord='', liarId='';
  let phase='wait-role'; // wait-role | discuss | vote | result
  let votes={};  // id→targetId
  let discussTimer=60, timerInt=null;
  let myRole='crew'; // 'crew' or 'liar'
  let chatLog=[];
  const mySession = _gameSession; // capture session token at init

  // Register cleanup so backToMenu kills the timer
  window._cleanup = () => { clearInterval(timerInt); timerInt = null; };

  function sync(extra) {
    if(_gameSession !== mySession) return;
    if(!isOnline||!amHost) return;
    broadcastGame({lr:true, phase, votes, chatLog, discussTimer, cat,
      ejected:STATE._lrEjected||null, ...extra});
  }

  window._gameDataHandler = function(data) {
    if(_gameSession !== mySession) return; // stale — bail
    if(!data.lr) return;
    if(amHost) {
      if(data.action==='vote'){
        votes[data.voterId]=data.targetId;
        // all voted?
        if(players.every(p=>votes[p.id])) { resolveVote(); return; }
        sync();
      }
      if(data.action==='chat'){
        chatLog.push(data.msg);
        sync();
      }
    } else {
      if(data.phase) phase=data.phase;
      if(data.votes) votes=data.votes;
      if(data.chatLog) chatLog=data.chatLog;
      if(data.discussTimer!==undefined) discussTimer=data.discussTimer;
      if(data.cat) cat=data.cat;
      if(data.secretWord) secretWord=data.secretWord; // only in result
      if(data.liarId) { liarId=data.liarId; myRole=liarId===myId?'liar':'crew'; }
      if(data.ejected!==undefined) STATE._lrEjected=data.ejected;
      render();
    }
  };

  function resolveVote(){
    const tally={};
    Object.values(votes).forEach(v=>{if(v!=='skip')tally[v]=(tally[v]||0)+1;});
    const ejected=Object.entries(tally).sort((a,b)=>b[1]-a[1])[0]?.[0]||null;
    STATE._lrEjected=ejected;
    phase='result';
    sync({secretWord, liarId, ejected});
    clearInterval(timerInt);
    render();
  }

  function startDiscussTimer(){
    clearInterval(timerInt);
    timerInt=setInterval(()=>{
      if(_gameSession !== mySession){ clearInterval(timerInt); return; }
      discussTimer--;
      const el=document.getElementById('lr-timer');
      if(el) el.textContent=discussTimer+'s';
      if(isOnline&&amHost) sync();
      if(discussTimer<=0){clearInterval(timerInt);phase='vote';sync();render();}
    },1000);
  }

  function render(){
    container.innerHTML='';

    if(phase==='wait-role'){
      // Show each player their role card
      const amLiar=myRole==='liar';
      container.innerHTML=`
      <div class="lr-wrap">
        <div class="lr-title">🤥 Who's the Liar?</div>
        <div class="lr-word-card" style="text-align:center;">
          ${amLiar?`
            <div class="liar-label">⚠️ YOU ARE THE LIAR</div>
            <div class="genre">Category: <strong>${cat}</strong></div>
            <div style="font-size:13px;color:var(--muted);margin-top:8px;">You don't know the word — blend in!</div>
          `:`
            <div class="genre">Category: ${cat}</div>
            <div class="the-word">${secretWord}</div>
            <div style="font-size:13px;color:var(--muted);margin-top:8px;">Describe it without saying it directly.</div>
          `}
        </div>
        ${(amHost||!isOnline)?`<button class="btn btn-primary" onclick="lrStartDiscuss()">Start Discussion 🗣️</button>`
          :`<div style="color:var(--muted);font-size:14px;">Waiting for host to start…</div>`}
        <button class="btn btn-secondary" onclick="backToMenu()">← Back</button>
      </div>`;
      return;
    }

    if(phase==='discuss'){
      container.innerHTML=`
      <div class="lr-wrap">
        <div class="lr-title">🗣️ Discussion</div>
        <div style="font-family:'Boogaloo',cursive;font-size:48px;color:var(--accent4);" id="lr-timer">${discussTimer}s</div>
        <div class="lr-word-card" style="padding:18px 32px;text-align:center;max-width:440px;">
          <div class="genre">Category: ${cat}</div>
          <div style="font-size:14px;color:var(--muted);margin-top:6px;">Describe the word in one sentence. The liar must fake it!</div>
        </div>
        <!-- In-game chat for discussion -->
        <div style="width:100%;max-width:480px;">
          <div id="lr-chat" style="background:#0d0d1a;border:2px solid var(--border);border-radius:14px 14px 0 0;
            min-height:80px;max-height:140px;overflow-y:auto;padding:10px 14px;
            display:flex;flex-direction:column;gap:6px;">
            ${chatLog.length===0?'<div style="color:var(--muted);font-size:13px;font-style:italic;">Say something…</div>'
              :chatLog.map(m=>`<div><span style="font-weight:800;color:var(--accent2);font-size:12px;">${m.name}: </span><span>${m.text}</span></div>`).join('')}
          </div>
          <div style="display:flex;border:2px solid var(--border);border-top:none;border-radius:0 0 14px 14px;overflow:hidden;">
            <input id="lr-chat-input" type="text" maxlength="80" placeholder="Describe the word…"
              style="flex:1;background:#16162a;border:none;outline:none;padding:10px 14px;
                color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;"
              onkeydown="if(event.key==='Enter')lrSendChat()"/>
            <button onclick="lrSendChat()" style="background:var(--accent3);border:none;padding:0 16px;
              color:#fff;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;">Send</button>
          </div>
        </div>
        <button class="btn btn-primary" onclick="lrGoVote()">Skip to Vote ▶</button>
        <button class="btn btn-secondary" onclick="backToMenu()">← Back</button>
      </div>`;
      if(amHost||!isOnline) startDiscussTimer();
      setTimeout(()=>{const c=document.getElementById('lr-chat');if(c)c.scrollTop=c.scrollHeight;},0);
      return;
    }

    if(phase==='vote'){
      container.innerHTML=`
      <div class="lr-wrap">
        <div class="lr-title">🗳️ Vote</div>
        <div class="text-muted">Who is the liar?</div>
        <div class="lr-players">
          ${players.map(p=>`
            <button class="lr-player-btn ${votes[myId]===p.id?'suspect':''}"
              onclick="lrVote('${p.id}')" ${votes[myId]?'disabled':''}>
              ${p.name}${votes[p.id]?` <span style="font-size:11px;color:var(--muted);">(voted)</span>`:''}
            </button>`).join('')}
          <button class="lr-player-btn" onclick="lrVote('skip')" ${votes[myId]?'disabled':''}>⏭ Skip</button>
        </div>
        ${votes[myId]?'<div style="color:var(--muted);font-size:13px;">Vote cast! Waiting for others…</div>':''}
        <button class="btn btn-secondary" onclick="backToMenu()">← Back</button>
      </div>`;
      return;
    }

    if(phase==='result'){
      const liarPlayer=players.find(p=>p.id===liarId);
      const ejected=STATE._lrEjected;
      const caught=ejected===liarId;
      container.innerHTML=`
      <div class="lr-wrap">
        <div class="lr-title">📋 Reveal</div>
        <div class="lr-word-card" style="text-align:center;padding:28px 48px;">
          <div class="genre">Category: ${cat}</div>
          <div class="the-word">${secretWord}</div>
          <div style="margin-top:12px;font-size:17px;">
            🤥 Liar was: <strong style="color:var(--accent1);">${liarPlayer?.name||'?'}</strong>
          </div>
          <div style="margin-top:8px;font-size:20px;font-weight:900;
            color:${caught?'var(--accent5)':'var(--accent1)'};">
            ${caught?'🎉 Liar caught!':'😈 Liar escaped!'}
          </div>
        </div>
        <div class="flex-center">
          <button class="btn btn-primary" onclick="launchGame('liar')">Play Again</button>
          <button class="btn btn-secondary" onclick="backToMenu()">← Games</button>
        </div>
      </div>`;
    }
  }

  window.lrStartDiscuss = function(){
    phase='discuss'; sync(); render();
  };
  window.lrGoVote = function(){
    clearInterval(timerInt); phase='vote'; sync(); render();
  };
  window.lrVote = function(targetId){
    if(votes[myId]) return;
    votes[myId]=targetId;
    if(isOnline&&!amHost) broadcastGame({lr:true,action:'vote',voterId:myId,targetId});
    else if(isOnline&&amHost){ if(players.every(p=>votes[p.id])) resolveVote(); else sync(); }
    else { if(players.every(p=>votes[p.id])) resolveVote(); else render(); }
  };
  window.lrSendChat = function(){
    const inp=document.getElementById('lr-chat-input');
    const txt=inp?.value.trim(); if(!txt) return;
    const msg={name:STATE.playerName,text:txt}; inp.value='';
    chatLog.push(msg);
    if(isOnline&&!amHost) broadcastGame({lr:true,action:'chat',msg});
    else if(isOnline&&amHost) sync();
    render();
    setTimeout(()=>{const c=document.getElementById('lr-chat');if(c)c.scrollTop=c.scrollHeight;},0);
  };

  // INIT — host picks roles and sends
  if(amHost||!isOnline){
    cat=cats[Math.floor(Math.random()*cats.length)];
    const words=CATEGORIES[cat];
    secretWord=words[Math.floor(Math.random()*words.length)];
    const shuffled=[...players].sort(()=>Math.random()-.5);
    liarId=shuffled[0].id;
    myRole=liarId===myId?'liar':'crew';
    phase='wait-role';
    if(isOnline){
      // Send each player their role privately — broadcast liarId+cat, secretWord only for crew
      // Since we can't send per-player messages easily, broadcast all and guests self-filter
      broadcastGame({lr:true, phase:'wait-role', cat, secretWord, liarId});
    }
    render();
  } else {
    container.innerHTML=`
    <div class="lr-wrap">
      <div class="lr-title">🤥 Who's the Liar?</div>
      <div style="color:var(--muted);">Waiting for host to set up the round…</div>
      <div style="width:36px;height:36px;border:3px solid var(--accent3);border-top-color:transparent;
        border-radius:50%;animation:spin .8s linear infinite;margin:12px auto;"></div>
      <button class="btn btn-secondary" onclick="backToMenu()">← Back</button>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>`;
  }
}

// ══════════════════════════════════════

//  GAME 6 — RAPID FIRE TRIVIA
// ══════════════════════════════════════
function initTrivia(container) {

  const isOnline = STATE.mode === 'online';
  const amHost   = !isOnline || STATE.isHost;
  const myId     = amHost ? 'local' : (STATE.peer ? STATE.peer.id : 'local');
  const players  = (() => {
    if (!isOnline) return STATE.players.length >= 2 ? STATE.players
      : [{id:'local',name:STATE.playerName},{id:'p2',name:'Player 2'},{id:'p3',name:'Player 3'}];
    const me = {id: myId, name: STATE.playerName};
    if (amHost) {
      const guests = STATE.players.filter(p=>p.id!=='local');
      return [me, ...guests.map(p=>({id:p.id,name:p.name}))];
    }
    const list = STATE.players.length>=2 ? STATE.players.map(p=>({id:p.id,name:p.name})) : [{id:'local',name:'Host'},me];
    if (!list.find(p=>p.id===me.id)) list.push(me);
    return list;
  })();

  const ALL_QUESTIONS = [
    {q:"What planet is closest to the Sun?",a:"Mercury",opts:["Mars","Venus","Mercury","Earth"]},
    {q:"How many sides does a hexagon have?",a:"6",opts:["5","6","7","8"]},
    {q:"Capital of Japan?",a:"Tokyo",opts:["Seoul","Beijing","Tokyo","Bangkok"]},
    {q:"What gas do plants absorb?",a:"CO₂",opts:["Oxygen","Nitrogen","CO₂","Hydrogen"]},
    {q:"Who painted the Mona Lisa?",a:"Da Vinci",opts:["Picasso","Da Vinci","Rembrandt","Monet"]},
    {q:"Fastest land animal?",a:"Cheetah",opts:["Lion","Falcon","Cheetah","Greyhound"]},
    {q:"Bones in the adult human body?",a:"206",opts:["186","196","206","216"]},
    {q:"Element symbol Au?",a:"Gold",opts:["Silver","Copper","Gold","Platinum"]},
    {q:"Largest ocean?",a:"Pacific",opts:["Atlantic","Indian","Pacific","Arctic"]},
    {q:"WW2 ended?",a:"1945",opts:["1943","1944","1945","1946"]},
    {q:"Most native speakers?",a:"Mandarin",opts:["English","Spanish","Mandarin","Hindi"]},
    {q:"Square root of 144?",a:"12",opts:["11","12","13","14"]},
    {q:"Most moons?",a:"Saturn",opts:["Jupiter","Saturn","Uranus","Neptune"]},
    {q:"H₂O is?",a:"Water",opts:["Salt","Water","Sugar","Acid"]},
    {q:"Strings on a guitar?",a:"6",opts:["4","5","6","7"]},
    {q:"Closest star to Earth (after Sun)?",a:"Proxima Centauri",opts:["Betelgeuse","Proxima Centauri","Sirius","Vega"]},
    {q:"Chemical symbol for Gold?",a:"Au",opts:["Ag","Au","Fe","Cu"]},
    {q:"Year the Titanic sank?",a:"1912",opts:["1908","1910","1912","1915"]},
  ];

  // Host picks questions, shuffles, broadcasts
  let QUESTIONS = [];
  let qi = 0;
  let scores = {};
  players.forEach(p => scores[p.id] = 0);
  let answered = false;
  let playerAnswers = {};  // id → option chosen this question
  let timeLeft = 15;
  let timerInt = null;
  let opts = [];  // shuffled opts for current question

  // Broadcast full game state to all guests (host only)
  function sync(extra) {
    if (!isOnline || !amHost) return;
    broadcastGame({
      tv: true,
      qi, scores, playerAnswers, answered, timeLeft,
      questions: QUESTIONS,   // send full questions array so guests always have it
      opts,
      ...extra
    });
  }

  // ── Guest-side state handler ──────────────────────────────────────────────
  window._gameDataHandler = function(data) {
    if (_gameSession !== mySession) return; // stale handler — ignore
    if (!data.tv) return;

    if (amHost) {
      // Host receives an answer from a guest
      if (data.action === 'answer') {
        if (answered || playerAnswers[data.id] !== undefined) return; // ignore late/dupe
        playerAnswers[data.id] = data.opt;
        scores[data.id] = (scores[data.id] || 0) + (data.opt === QUESTIONS[qi].a ? 1 : 0);
        // If everyone has answered, end the question
        if (players.every(p => playerAnswers[p.id] !== undefined)) {
          clearInterval(timerInt);
          answered = true;
        }
        sync(); // broadcast updated state (scores, playerAnswers, answered) to all guests
        render(); // re-render host view (won't restart timer because answered=true or timer already running)
      }
    } else {
      // Guest receives authoritative state from host
      if (data.questions) QUESTIONS = data.questions;
      if (data.qi !== undefined) qi = data.qi;
      if (data.scores) scores = data.scores;
      if (data.playerAnswers) playerAnswers = data.playerAnswers;
      if (data.answered !== undefined) answered = data.answered;
      if (data.timeLeft !== undefined) timeLeft = data.timeLeft;
      if (data.opts) opts = data.opts;
      // If host signalled game over
      if (data.gameOver) { showResults(); return; }
      render();
    }
  };

  // ── Timer (host-only; guests receive timeLeft via sync every second) ──────
  const mySession = _gameSession; // capture at game init
  function startTimer() {
    clearInterval(timerInt);
    timerInt = setInterval(() => {
      if (_gameSession !== mySession) { clearInterval(timerInt); return; } // stale — bail
      timeLeft--;
      // Live-update the timer element without a full re-render
      const el = document.getElementById('tv-timer');
      if (el) {
        el.textContent = timeLeft + 's';
        el.style.color = timeLeft <= 5 ? 'var(--accent1)' : 'var(--accent2)';
      }
      if (isOnline && amHost) sync();
      if (timeLeft <= 0) {
        clearInterval(timerInt);
        answered = true;
        if (isOnline && amHost) sync();
        render();
      }
    }, 1000);
  }

  function render() {
    if (_gameSession !== mySession) return; // stale — don't touch DOM
    if (qi >= QUESTIONS.length) { showResults(); return; }
    const q = QUESTIONS[qi];
    if (!q) {
      container.innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--muted);">Loading…</div>`;
      return;
    }

    container.innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:20px;padding:36px 20px;
      background:radial-gradient(ellipse at 50% 30%, #1a1000 0%, #0d0d1a 70%);">
      <div style="font-family:'Boogaloo',cursive;font-size:40px;color:var(--accent4);">⚡ Rapid Fire</div>
      <div style="display:flex;gap:20px;align-items:center;">
        <div style="color:var(--muted);font-size:14px;">Q${qi+1}/${QUESTIONS.length}</div>
        <div style="font-family:'Boogaloo',cursive;font-size:28px;
          color:${timeLeft<=5?'var(--accent1)':'var(--accent2)'};" id="tv-timer">${timeLeft}s</div>
      </div>
      <div style="background:var(--card);border:2px solid var(--border);border-radius:18px;
        padding:24px 32px;max-width:580px;width:100%;text-align:center;">
        <div style="font-size:20px;font-weight:800;line-height:1.4;">${q.q}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:540px;width:100%;">
        ${opts.map((o,i) => {
          const myAns = playerAnswers[myId];
          let st = '';
          if (answered) {
            if (o === q.a) st = 'border-color:var(--accent5);background:#34d39922;color:var(--accent5);';
            else if (o === myAns && myAns !== q.a) st = 'border-color:var(--accent1);background:#ff4f7b22;color:var(--accent1);';
          } else if (o === myAns) st = 'border-color:var(--accent3);background:#a78bfa22;';
          return `<button data-opt="${i}"
            style="background:var(--card);border:2px solid var(--border);border-radius:14px;
              padding:16px;color:var(--text);cursor:pointer;font-family:'Nunito',sans-serif;
              font-weight:700;font-size:15px;transition:all .15s;${st}
              ${answered || playerAnswers[myId] !== undefined ? 'pointer-events:none;opacity:0.7;' : ''}">
            ${['🅰️','🅱️','🆑','🆔'][i]} ${o}
          </button>`;
        }).join('')}
      </div>
      <!-- Per-player answer status -->
      <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">
        ${players.map(p => {
          const ans = playerAnswers[p.id];
          const hasAnswered = ans !== undefined;
          return `<div style="background:${answered?(ans===q.a?'#34d39922':'#ff4f7b22'):(hasAnswered?'#a78bfa22':'#ffffff08')};
            border:1px solid ${answered?(ans===q.a?'var(--accent5)':'var(--accent1)'):(hasAnswered?'var(--accent3)':'var(--border)')};
            border-radius:10px;padding:6px 12px;font-size:13px;font-weight:700;">
            ${answered ? (ans===q.a?'✅':'❌') : (hasAnswered?'🔒':'⏳')} ${p.name}${answered?' — '+(ans||'—'):''}
          </div>`;
        }).join('')}
      </div>
      ${answered ? `
        ${(amHost || !isOnline)
          ? `<button class="btn btn-primary" onclick="tvNext()">${qi+1 < QUESTIONS.length ? 'Next ▶' : 'Results 🏆'}</button>`
          : `<div style="color:var(--muted);font-size:13px;margin-top:4px;">Waiting for host…</div>`}
      ` : ''}
      <button class="btn btn-secondary" onclick="backToMenu()">← Back</button>
    </div>`;

    setTimeout(() => {
      document.querySelectorAll('[data-opt]').forEach(btn => {
        const i = parseInt(btn.dataset.opt);
        btn.addEventListener('click', () => tvAnswer(opts[i]));
      });
    }, 0);

    // Only host (or solo) starts the timer, and only when the question is active
    if (!answered && (amHost || !isOnline)) startTimer();
  }

  function showResults() {
    if (_gameSession !== mySession) return;
    clearInterval(timerInt);
    // Broadcast game-over to guests before showing locally
    if (isOnline && amHost) sync({ gameOver: true });
    const sorted = [...players].sort((a,b) => (scores[b.id]||0) - (scores[a.id]||0));
    container.innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:20px;padding:36px 20px;background:radial-gradient(ellipse at 50% 30%, #1a1000 0%, #0d0d1a 70%);">
      <div style="font-family:'Boogaloo',cursive;font-size:40px;color:var(--accent4);">⚡ Final Scores</div>
      <div style="display:flex;flex-direction:column;gap:8px;width:100%;max-width:460px;">
        ${sorted.map((p,i) => `
          <div style="display:flex;justify-content:space-between;align-items:center;
            background:${i===0?'#fbbf2412':'var(--card)'};
            border:2px solid ${i===0?'var(--accent4)':'var(--border)'};
            border-radius:14px;padding:14px 22px;">
            <span style="font-weight:800;font-size:17px;">${['🥇','🥈','🥉'][i]||'  '} ${p.name}</span>
            <span style="font-family:'Boogaloo',cursive;font-size:28px;color:var(--accent4);">${scores[p.id]||0}</span>
          </div>`).join('')}
      </div>
      <div class="flex-center" style="gap:12px;margin-top:8px;">
        <button class="btn btn-primary" onclick="launchGame('trivia')">Play Again</button>
        <button class="btn btn-secondary" onclick="backToMenu()">← Games</button>
      </div>
    </div>`;
  }

  window.tvAnswer = function(opt) {
    if (playerAnswers[myId] !== undefined || answered) return;
    playerAnswers[myId] = opt;
    if (isOnline && !amHost) {
      // Guest: send answer to host; host will update scores and broadcast back
      broadcastGame({ tv: true, action: 'answer', id: myId, opt });
      render(); // optimistic re-render (shows own answer locked in)
    } else {
      // Solo or host answering
      scores[myId] = (scores[myId] || 0) + (opt === QUESTIONS[qi].a ? 1 : 0);
      if (players.every(p => playerAnswers[p.id] !== undefined)) {
        clearInterval(timerInt);
        answered = true;
        if (isOnline && amHost) sync();
      }
      render();
    }
  };

  window.tvNext = function() {
    clearInterval(timerInt);
    qi++; answered = false; playerAnswers = {}; timeLeft = 15;
    if (qi >= QUESTIONS.length) { showResults(); return; }
    opts = [...QUESTIONS[qi].opts].sort(() => Math.random() - .5);
    if (isOnline && amHost) sync(); // send new question + reset state to all guests
    render();
  };

  // ── INIT ─────────────────────────────────────────────────────────────────
  if (amHost || !isOnline) {
    QUESTIONS = [...ALL_QUESTIONS].sort(() => Math.random() - .5).slice(0, 10);
    opts = [...QUESTIONS[0].opts].sort(() => Math.random() - .5);
    if (isOnline) sync(); // send initial state to any guests already connected
    render();
  } else {
    // Guest: show waiting screen; render() will be called when host syncs
    container.innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:16px;background:#0d0d1a;color:var(--muted);">
      <div style="font-family:'Boogaloo',cursive;font-size:36px;color:var(--accent4);">⚡ Rapid Fire</div>
      <div>Waiting for host to start…</div>
      <div style="width:36px;height:36px;border:3px solid var(--accent4);border-top-color:transparent;
        border-radius:50%;animation:spin .8s linear infinite;"></div>
      <button class="btn btn-secondary" onclick="backToMenu()">← Back</button>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>`;
  }
}

// ══════════════════════════════════════
//  GAME 7 — GARTIC SWAP
// ══════════════════════════════════════
function initGarticSwap(container) {
  const isOnline = STATE.mode === 'online';
  const amHost   = !isOnline || STATE.isHost;
  const myId     = amHost ? 'local' : (STATE.peer ? STATE.peer.id : 'local');
  const players  = (() => {
    if (!isOnline) return STATE.players.length >= 2 ? STATE.players
      : [{id:'local',name:STATE.playerName},{id:'p2',name:'Player 2'},{id:'p3',name:'Player 3'},{id:'p4',name:'Player 4'}];
    const me = {id: myId, name: STATE.playerName};
    if (amHost) {
      const guests = STATE.players.filter(p=>p.id!=='local');
      return [me, ...guests.map(p=>({id:p.id,name:p.name}))];
    }
    const list = STATE.players.length>=2 ? STATE.players.map(p=>({id:p.id,name:p.name})) : [{id:'local',name:'Host'},me];
    if (!list.find(p=>p.id===me.id)) list.push(me);
    return list;
  })();

  // Phase: 'write' → 'draw' → 'reveal'
  let phase = 'write';
  let prompts = {};     // playerId → written prompt text
  let assignments = {}; // playerId → {fromId, prompt} (who draws what)
  let drawings = {};    // playerId → {imgData, prompt, drawer, writer}
  let drawColor = '#f0f0ff';
  let drawSize  = 5;
  let canvasData = [];
  let myPrompt = '';
  let myAssignment = null; // {fromId, prompt}
  let submitted = false;

  // ── SYNC ─────────────────────────────────────────────────────────
  function sync(extra={}) {
    if (!isOnline || !amHost) return;
    broadcastGame({ gs:true, phase, prompts, assignments, drawings, ...extra });
  }

  window._gameDataHandler = function(data) {
    if (!data.gs) return;
    if (amHost) {
      if (data.action === 'submitPrompt') {
        prompts[data.id] = data.prompt;
        sync();
        // Check if all submitted
        if (players.every(p => prompts[p.id])) {
          assignPrompts();
        } else {
          render();
        }
      } else if (data.action === 'submitDrawing') {
        drawings[data.id] = { imgData: data.imgData, prompt: data.prompt, drawer: data.drawerName, writer: data.writerName };
        sync();
        if (players.every(p => drawings[p.id])) {
          phase = 'reveal';
          sync();
        }
        render();
      }
    } else {
      phase = data.phase || phase;
      prompts = data.prompts || prompts;
      assignments = data.assignments || assignments;
      drawings = data.drawings || drawings;
      if (phase === 'draw' && assignments[myId] && !myAssignment) {
        myAssignment = assignments[myId];
      }
      render();
    }
  };

  function assignPrompts() {
    // Shuffle player ids and assign each person the next player's prompt
    const ids = [...players].sort(() => Math.random() - 0.5).map(p => p.id);
    ids.forEach((id, i) => {
      const fromId = ids[(i + 1) % ids.length];
      assignments[id] = { fromId, prompt: prompts[fromId] };
    });
    phase = 'draw';
    sync();
    // Host sets their own assignment too
    myAssignment = assignments[myId];
    render();
  }

  // ── RENDER ───────────────────────────────────────────────────────
  function render() {
    if (phase === 'write') renderWrite();
    else if (phase === 'draw') renderDraw();
    else renderReveal();
  }

  function renderWrite() {
    const submitted_ids = Object.keys(prompts);
    const waiting = submitted_ids.includes(myId);
    container.innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:24px;padding:30px;
      background:radial-gradient(ellipse at center,#1a0030 0%,#0d0d1a 70%);">
      <div style="font-family:'Boogaloo',cursive;font-size:40px;color:#ec4899;">🔀 Gartic Swap</div>
      <div style="background:var(--card);border:2px solid var(--border);border-radius:18px;
        padding:32px 40px;max-width:520px;width:100%;text-align:center;">
        <div style="color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;">Phase 1 — Write</div>
        <div style="font-family:'Boogaloo',cursive;font-size:24px;color:#ec4899;margin-bottom:8px;">
          Write something to draw!
        </div>
        <div style="color:var(--muted);font-size:13px;margin-bottom:20px;">
          Describe a scene, a character, an event — anything. Someone else will have to draw it!
        </div>
        ${waiting ? `
          <div style="padding:20px;background:#ec489922;border:2px solid #ec4899;border-radius:12px;margin-bottom:12px;">
            <div style="font-size:20px;margin-bottom:6px;">✅</div>
            <div style="font-weight:800;color:#ec4899;">Prompt submitted!</div>
            <div style="color:var(--muted);font-size:13px;margin-top:4px;">"${prompts[myId]}"</div>
          </div>
          <div style="color:var(--muted);font-size:13px;">Waiting for everyone else…</div>
        ` : `
          <div class="input-group" style="margin-bottom:12px;">
            <input id="gs-prompt-input" type="text" maxlength="80"
              placeholder="e.g. A cat surfing a pizza on the moon"
              style="flex:1;background:#ffffff08;border:2px solid var(--border);border-radius:12px;
                padding:12px 16px;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;outline:none;"
              onkeydown="if(event.key==='Enter')gsSubmitPrompt()"/>
          </div>
          <button class="btn btn-primary" onclick="gsSubmitPrompt()" style="width:100%;background:linear-gradient(135deg,#ec4899,#a78bfa);">
            Submit Prompt ✏️
          </button>
        `}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
        ${players.map(p=>`
          <div style="background:${prompts[p.id]?'#ec489922':'#ffffff08'};
            border:1px solid ${prompts[p.id]?'#ec4899':'var(--border)'};
            border-radius:99px;padding:6px 14px;font-size:13px;font-weight:700;">
            ${prompts[p.id]?'✅':'⏳'} ${p.name}
          </div>`).join('')}
      </div>
      <button class="btn btn-secondary" onclick="backToMenu()">← Back</button>
    </div>`;
    if (!waiting) setTimeout(()=>{
      const inp = document.getElementById('gs-prompt-input');
      if (inp) inp.focus();
    }, 50);
  }

  function renderDraw() {
    if (!myAssignment) { myAssignment = assignments[myId]; }
    const alreadyDrawn = drawings[myId];
    const writerName = players.find(p=>p.id===myAssignment?.fromId)?.name || '?';
    const submitted_count = Object.keys(drawings).length;

    if (alreadyDrawn && !submitted) submitted = true;

    container.innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;
      gap:16px;padding:24px 16px;
      background:radial-gradient(ellipse at center,#1a0030 0%,#0d0d1a 70%);">
      <div style="font-family:'Boogaloo',cursive;font-size:36px;color:#ec4899;">🔀 Gartic Swap</div>
      <div style="background:var(--card);border:2px solid #ec4899;border-radius:16px;
        padding:16px 28px;text-align:center;max-width:600px;width:100%;">
        <div style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;">
          Phase 2 — Draw &nbsp;·&nbsp; ${submitted_count}/${players.length} done
        </div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:4px;">Prompt by <strong style="color:#ec4899;">${writerName}</strong></div>
        <div style="font-family:'Boogaloo',cursive;font-size:26px;color:var(--text);">
          "${myAssignment?.prompt || '…'}"
        </div>
      </div>
      ${submitted ? `
        <div style="background:#ec489922;border:2px solid #ec4899;border-radius:14px;
          padding:24px 32px;text-align:center;max-width:480px;">
          <div style="font-size:32px;margin-bottom:8px;">✅</div>
          <div style="font-family:'Boogaloo',cursive;font-size:22px;color:#ec4899;">Drawing submitted!</div>
          <div style="color:var(--muted);font-size:13px;margin-top:6px;">Waiting for ${players.length - submitted_count} more player${players.length-submitted_count===1?'':'s'}…</div>
        </div>
      ` : `
        <div style="background:#1a1a2e;border:2px solid var(--border);border-radius:16px;overflow:hidden;">
          <canvas id="gs-canvas" width="${Math.min(660,window.innerWidth-40)}" height="340"
            style="display:block;cursor:crosshair;touch-action:none;"></canvas>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;">
          ${['#f0f0ff','#ff4f7b','#4fc3f7','#fbbf24','#34d399','#a78bfa','#f97316','#1a1a2e'].map(c=>`
            <div onclick="gsSetColor('${c}')"
              style="width:30px;height:30px;border-radius:50%;background:${c};cursor:pointer;
                border:3px solid ${drawColor===c?'#fff':'transparent'};transition:transform .15s;
                ${drawColor===c?'transform:scale(1.2);':''}"></div>`).join('')}
          <div style="width:1px;height:24px;background:var(--border);margin:0 4px;"></div>
          ${[3,6,12,20].map(s=>`
            <button onclick="gsSetSize(${s})"
              style="background:var(--card);border:2px solid ${drawSize===s?'#ec4899':'var(--border)'};
                border-radius:8px;width:34px;height:34px;color:var(--text);cursor:pointer;
                font-size:11px;font-weight:700;font-family:'Nunito',sans-serif;">${s}</button>`).join('')}
          <button onclick="gsClearCanvas()"
            style="background:var(--card);border:2px solid var(--border);border-radius:8px;
              padding:6px 12px;color:var(--text);cursor:pointer;font-size:12px;font-weight:700;
              font-family:'Nunito',sans-serif;">Clear</button>
        </div>
        <button class="btn btn-primary" onclick="gsSubmitDrawing()"
          style="background:linear-gradient(135deg,#ec4899,#a78bfa);">
          Submit Drawing 🎨
        </button>
      `}
      <button class="btn btn-secondary" onclick="backToMenu()">← Back</button>
    </div>`;

    if (!submitted) {
      const canvas = document.getElementById('gs-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle='#1a1a2e'; ctx.fillRect(0,0,canvas.width,canvas.height);
      canvasData.forEach(d=>{
        ctx.strokeStyle=d.color; ctx.lineWidth=d.size; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(d.x0,d.y0); ctx.lineTo(d.x1,d.y1); ctx.stroke();
      });
      let px,py,pen=false;
      function pt(e){const r=canvas.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return[s.clientX-r.left,s.clientY-r.top];}
      canvas.onmousedown=e=>{pen=true;[px,py]=pt(e);};
      canvas.onmousemove=e=>{
        if(!pen)return;
        const[x,y]=pt(e);
        ctx.strokeStyle=drawColor;ctx.lineWidth=drawSize;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(x,y);ctx.stroke();
        canvasData.push({x0:px,y0:py,x1:x,y1:y,color:drawColor,size:drawSize});
        [px,py]=[x,y];
      };
      canvas.onmouseup=canvas.onmouseleave=()=>pen=false;
      canvas.ontouchstart=e=>{e.preventDefault();pen=true;[px,py]=pt(e);};
      canvas.ontouchmove=e=>{
        e.preventDefault();if(!pen)return;
        const[x,y]=pt(e);
        ctx.strokeStyle=drawColor;ctx.lineWidth=drawSize;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(x,y);ctx.stroke();
        canvasData.push({x0:px,y0:py,x1:x,y1:y,color:drawColor,size:drawSize});
        [px,py]=[x,y];
      };
      canvas.ontouchend=()=>pen=false;
    }
  }

  function renderReveal() {
    const entries = Object.entries(drawings);
    container.innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;
      gap:24px;padding:30px 20px;
      background:radial-gradient(ellipse at center,#1a0030 0%,#0d0d1a 70%);">
      <div style="font-family:'Boogaloo',cursive;font-size:40px;color:#ec4899;">🔀 Gartic Swap — Reveal!</div>
      <div style="color:var(--muted);font-size:14px;">See how everyone interpreted the prompts!</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
        gap:20px;width:100%;max-width:1100px;">
        ${entries.map(([id, d])=>`
          <div style="background:var(--card);border:2px solid #ec4899;border-radius:18px;
            overflow:hidden;display:flex;flex-direction:column;">
            <div style="padding:14px 18px;border-bottom:1px solid var(--border);">
              <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;">
                Prompt by <strong style="color:#ec4899;">${d.writer}</strong>
              </div>
              <div style="font-weight:800;font-size:16px;">"${d.prompt}"</div>
            </div>
            <img src="${d.imgData}"
              style="width:100%;height:220px;object-fit:contain;background:#1a1a2e;display:block;">
            <div style="padding:10px 18px;display:flex;align-items:center;gap:8px;">
              <div style="width:8px;height:8px;border-radius:50%;background:#ec4899;"></div>
              <div style="font-size:13px;font-weight:700;">Drawn by ${d.drawer}</div>
            </div>
          </div>`).join('')}
      </div>
      <div style="display:flex;gap:12px;margin-top:8px;">
        <button class="btn btn-primary" onclick="launchGame('garticswap')"
          style="background:linear-gradient(135deg,#ec4899,#a78bfa);">Play Again</button>
        <button class="btn btn-secondary" onclick="backToMenu()">← Games</button>
      </div>
    </div>`;
  }

  // ── ACTIONS ──────────────────────────────────────────────────────
  window.gsSubmitPrompt = function() {
    const v = document.getElementById('gs-prompt-input')?.value.trim();
    if (!v) { notify('Write a prompt first!','error'); return; }
    myPrompt = v;
    if (isOnline && !amHost) {
      broadcastGame({gs:true, action:'submitPrompt', id:myId, prompt:v});
      prompts[myId] = v;
      render();
    } else {
      prompts[myId] = v;
      sync();
      if (players.every(p=>prompts[p.id])) {
        assignPrompts();
      } else {
        render();
        // Solo: auto-fill missing players with fun prompts
        const soloPrompts = [
          'A penguin riding a shopping cart down a volcano',
          'A wizard who forgot the spell and is checking Google',
          'A cat convincing a dog to do their homework',
          'Two robots having an argument about pizza toppings',
          'A bear doing yoga on the moon',
        ];
        let si = 0;
        players.filter(p=>p.id!==myId).forEach(p=>{
          if (!prompts[p.id]) {
            prompts[p.id] = soloPrompts[si++ % soloPrompts.length];
          }
        });
        sync();
        if (players.every(p=>prompts[p.id])) assignPrompts();
      }
    }
  };

  window.gsSetColor = c => { drawColor=c; renderDraw(); };
  window.gsSetSize  = s => { drawSize=s; renderDraw(); };
  window.gsClearCanvas = () => { canvasData=[]; renderDraw(); };

  window.gsSubmitDrawing = function() {
    const canvas = document.getElementById('gs-canvas');
    if (!canvas) return;
    const imgData = canvas.toDataURL();
    const writerName = players.find(p=>p.id===myAssignment?.fromId)?.name || '?';
    const entry = { imgData, prompt: myAssignment?.prompt || '', drawer: STATE.playerName, writer: writerName };
    drawings[myId] = entry;
    canvasData = [];
    submitted = true;
    if (isOnline && !amHost) {
      broadcastGame({gs:true, action:'submitDrawing', id:myId,
        imgData, prompt:entry.prompt, drawerName:STATE.playerName, writerName});
      render();
    } else {
      sync();
      // Solo mode: auto-fill other players' drawings with blank canvases
      players.filter(p=>p.id!==myId).forEach(p=>{
        if (!drawings[p.id]) {
          const tmpCanvas = document.createElement('canvas');
          tmpCanvas.width=100;tmpCanvas.height=70;
          const tc=tmpCanvas.getContext('2d');tc.fillStyle='#1a1a2e';tc.fillRect(0,0,100,70);
          const wn=players.find(x=>x.id===assignments[p.id]?.fromId)?.name||'?';
          drawings[p.id]={imgData:tmpCanvas.toDataURL(),prompt:assignments[p.id]?.prompt||'',drawer:p.name,writer:wn};
        }
      });
      if (players.every(p=>drawings[p.id])) { phase='reveal'; sync(); }
      render();
    }
  };

  render();
}

// ══════════════════════════════════════
//  GAME 8 — GARTIC RELAY
// ══════════════════════════════════════
function initGarticRelay(container) {
  const isOnline = STATE.mode === 'online';
  const amHost   = !isOnline || STATE.isHost;
  const myId     = amHost ? 'local' : (STATE.peer ? STATE.peer.id : 'local');
  const players  = (() => {
    if (!isOnline) return STATE.players.length >= 2 ? STATE.players
      : [{id:'local',name:STATE.playerName},{id:'p2',name:'Alex'},{id:'p3',name:'Jordan'},{id:'p4',name:'Riley'}];
    const me = {id: myId, name: STATE.playerName};
    if (amHost) {
      const guests = STATE.players.filter(p=>p.id!=='local');
      return [me, ...guests.map(p=>({id:p.id,name:p.name}))];
    }
    const list = STATE.players.length>=2 ? STATE.players.map(p=>({id:p.id,name:p.name})) : [{id:'local',name:'Host'},me];
    if (!list.find(p=>p.id===me.id)) list.push(me);
    return list;
  })();

  const WORDS = [
    'Astronaut riding a unicorn','Spaghetti tornado','Robot doing yoga',
    'Penguin in a hot tub','Dragon eating a sandwich','Wizard playing tennis',
    'Cat as a chef','Dog driving a bus','Alien doing homework','Bear on a skateboard',
    'Mermaid at a dentist','Ghost eating ice cream','Pirate playing chess',
    'Dinosaur in a bathrobe','Vampire at the gym','Zombie hairdresser',
    'Ninja baking a cake','Cowboy in space','Clown at a funeral',
    'Giant hamster vs city','Octopus as a DJ','Penguin lawyer',
    'Werewolf yoga class','Sloth racing a cheetah','T-Rex arm wrestle',
  ];

  // Phase: 'wait' → 'draw' → 'guess' → 'reveal'
  let phase = 'wait';
  let secretWord = '';
  let turnOrder = [];      // player ids in relay order
  let currentTurnIdx = 0; // which player is currently drawing
  let drawings = [];       // [{playerId, playerName, imgData}] in order
  let myDrawing = null;    // the drawing I submitted
  let myGuess = '';
  let guesses = {};        // playerId → guess string
  let drawColor = '#f0f0ff';
  let drawSize  = 5;
  let canvasData = [];

  function myTurnIdx() { return turnOrder.indexOf(myId); }
  function isMyTurn()  { return turnOrder[currentTurnIdx] === myId; }

  // ── SYNC ─────────────────────────────────────────────────────────
  function sync(extra={}) {
    if (!isOnline || !amHost) return;
    broadcastGame({ gr:true, phase, secretWord, turnOrder, currentTurnIdx, drawings, guesses, ...extra });
  }

  window._gameDataHandler = function(data) {
    if (!data.gr) return;
    if (amHost) {
      if (data.action === 'submitDrawing') {
        drawings.push({ playerId: data.id, playerName: data.playerName, imgData: data.imgData });
        if (currentTurnIdx + 1 < turnOrder.length) {
          currentTurnIdx++;
          sync();
        } else {
          phase = 'guess';
          sync();
        }
        render();
      } else if (data.action === 'submitGuess') {
        guesses[data.id] = data.guess;
        if (players.every(p => guesses[p.id] !== undefined)) {
          phase = 'reveal';
          sync();
        } else sync();
        render();
      }
    } else {
      phase = data.phase || phase;
      secretWord = data.secretWord || secretWord;
      turnOrder = data.turnOrder || turnOrder;
      currentTurnIdx = data.currentTurnIdx !== undefined ? data.currentTurnIdx : currentTurnIdx;
      drawings = data.drawings || drawings;
      guesses = data.guesses || guesses;
      render();
    }
  };

  // ── INIT ─────────────────────────────────────────────────────────
  if (amHost || !isOnline) {
    secretWord = WORDS[Math.floor(Math.random() * WORDS.length)];
    turnOrder = [...players].sort(() => Math.random() - 0.5).map(p => p.id);
    currentTurnIdx = 0;
    phase = 'draw';
    sync();
    render();
  } else {
    container.innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:16px;background:radial-gradient(ellipse at center,#001a30 0%,#0d0d1a 70%);">
      <div style="font-family:'Boogaloo',cursive;font-size:38px;color:#4fc3f7;">📡 Relay</div>
      <div style="color:var(--muted);">Waiting for host to start the relay…</div>
      <div style="width:36px;height:36px;border:3px solid #4fc3f7;border-top-color:transparent;
        border-radius:50%;animation:spin .8s linear infinite;"></div>
      <button class="btn btn-secondary" onclick="backToMenu()">← Back</button>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>`;
  }

  // ── RENDER ───────────────────────────────────────────────────────
  function render() {
    if (phase === 'draw')   renderDraw();
    else if (phase === 'guess')  renderGuess();
    else if (phase === 'reveal') renderReveal();
  }

  function renderDraw() {
    const activePlayer = players.find(p => p.id === turnOrder[currentTurnIdx]);
    const prevDrawing  = drawings.length > 0 ? drawings[drawings.length - 1] : null;
    const imTurn = isMyTurn();
    const iHaveDrawn = myTurnIdx() < currentTurnIdx || myDrawing !== null;

    // Progress indicator
    const progressHtml = `
      <div style="display:flex;gap:6px;align-items:center;">
        ${turnOrder.map((id,i) => {
          const p = players.find(x=>x.id===id);
          const done = i < currentTurnIdx || (i === currentTurnIdx && !imTurn && drawings.find(d=>d.playerId===id));
          return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
            <div style="width:36px;height:36px;border-radius:50%;
              background:${done?'#4fc3f7':i===currentTurnIdx?'#4fc3f744':'#ffffff10'};
              border:2px solid ${done?'#4fc3f7':i===currentTurnIdx?'#4fc3f7':'var(--border)'};
              display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;
              color:${done?'#0d0d1a':i===currentTurnIdx?'#4fc3f7':'var(--muted)'};">
              ${done ? '✓' : i+1}
            </div>
            <div style="font-size:10px;color:${i===currentTurnIdx?'#4fc3f7':'var(--muted)'};max-width:54px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p?.name||'?'}</div>
          </div>`;
        }).join('<div style="width:20px;height:2px;background:var(--border);margin-top:18px;"></div>')}
      </div>`;

    if (imTurn) {
      container.innerHTML = `
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;
        gap:16px;padding:24px 16px;background:radial-gradient(ellipse at center,#001a30 0%,#0d0d1a 70%);">
        <div style="font-family:'Boogaloo',cursive;font-size:36px;color:#4fc3f7;">📡 Relay — Your Turn!</div>
        ${progressHtml}
        ${prevDrawing ? `
          <div style="background:var(--card);border:2px solid #4fc3f7;border-radius:16px;overflow:hidden;max-width:500px;width:100%;">
            <div style="padding:10px 16px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);">
              🎨 Previous player's drawing — draw what you <strong style="color:#4fc3f7;">think this shows</strong>!
            </div>
            <img src="${prevDrawing.imgData}" style="width:100%;max-height:260px;object-fit:contain;background:#1a1a2e;display:block;">
          </div>
        ` : `
          <div style="background:var(--card);border:2px solid #4fc3f7;border-radius:16px;padding:20px 28px;text-align:center;max-width:500px;width:100%;">
            <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">🎯 You're drawing first! The secret word is:</div>
            <div style="font-family:'Boogaloo',cursive;font-size:28px;color:#4fc3f7;">"${secretWord}"</div>
          </div>
        `}
        <div style="background:#1a1a2e;border:2px solid var(--border);border-radius:16px;overflow:hidden;">
          <canvas id="gr-canvas" width="${Math.min(600,window.innerWidth-40)}" height="320"
            style="display:block;cursor:crosshair;touch-action:none;"></canvas>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;">
          ${['#f0f0ff','#ff4f7b','#4fc3f7','#fbbf24','#34d399','#a78bfa','#f97316','#1a1a2e'].map(c=>`
            <div onclick="grSetColor('${c}')" style="width:30px;height:30px;border-radius:50%;background:${c};cursor:pointer;
              border:3px solid ${drawColor===c?'#fff':'transparent'};transition:transform .15s;${drawColor===c?'transform:scale(1.2);':''}"></div>`).join('')}
          <div style="width:1px;height:24px;background:var(--border);margin:0 4px;"></div>
          ${[3,6,12,20].map(s=>`
            <button onclick="grSetSize(${s})" style="background:var(--card);border:2px solid ${drawSize===s?'#4fc3f7':'var(--border)'};
              border-radius:8px;width:34px;height:34px;color:var(--text);cursor:pointer;
              font-size:11px;font-weight:700;font-family:'Nunito',sans-serif;">${s}</button>`).join('')}
          <button onclick="grClearCanvas()" style="background:var(--card);border:2px solid var(--border);border-radius:8px;
            padding:6px 12px;color:var(--text);cursor:pointer;font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;">Clear</button>
        </div>
        <button class="btn btn-primary" onclick="grSubmitDrawing()" style="background:linear-gradient(135deg,#4fc3f7,#a78bfa);">
          Pass Drawing ➡️
        </button>
        <button class="btn btn-secondary" onclick="backToMenu()">← Back</button>
      </div>`;

      const canvas = document.getElementById('gr-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0,0,canvas.width,canvas.height);
      canvasData.forEach(d => {
        ctx.strokeStyle=d.color;ctx.lineWidth=d.size;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(d.x0,d.y0);ctx.lineTo(d.x1,d.y1);ctx.stroke();
      });
      let px,py,pen=false;
      function pt(e){const r=canvas.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return[s.clientX-r.left,s.clientY-r.top];}
      canvas.onmousedown=e=>{pen=true;[px,py]=pt(e);};
      canvas.onmousemove=e=>{
        if(!pen)return;const[x,y]=pt(e);
        ctx.strokeStyle=drawColor;ctx.lineWidth=drawSize;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(x,y);ctx.stroke();
        canvasData.push({x0:px,y0:py,x1:x,y1:y,color:drawColor,size:drawSize});
        [px,py]=[x,y];
      };
      canvas.onmouseup=canvas.onmouseleave=()=>pen=false;
      canvas.ontouchstart=e=>{e.preventDefault();pen=true;[px,py]=pt(e);};
      canvas.ontouchmove=e=>{
        e.preventDefault();if(!pen)return;const[x,y]=pt(e);
        ctx.strokeStyle=drawColor;ctx.lineWidth=drawSize;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(x,y);ctx.stroke();
        canvasData.push({x0:px,y0:py,x1:x,y1:y,color:drawColor,size:drawSize});
        [px,py]=[x,y];
      };
      canvas.ontouchend=()=>pen=false;

    } else if (iHaveDrawn) {
      // Already submitted, waiting for others
      container.innerHTML = `
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
        gap:20px;padding:24px;background:radial-gradient(ellipse at center,#001a30 0%,#0d0d1a 70%);">
        <div style="font-family:'Boogaloo',cursive;font-size:36px;color:#4fc3f7;">📡 Relay</div>
        ${progressHtml}
        <div style="background:#4fc3f722;border:2px solid #4fc3f7;border-radius:16px;padding:28px 40px;text-align:center;">
          <div style="font-size:32px;margin-bottom:8px;">✅</div>
          <div style="font-family:'Boogaloo',cursive;font-size:22px;color:#4fc3f7;">Drawing passed!</div>
          <div style="color:var(--muted);font-size:13px;margin-top:6px;">
            Waiting for <strong style="color:var(--text);">${activePlayer?.name || '…'}</strong> to draw…
          </div>
        </div>
        <button class="btn btn-secondary" onclick="backToMenu()">← Back</button>
      </div>`;
    } else {
      // Haven't had my turn yet
      const turnsLeft = myTurnIdx() - currentTurnIdx;
      container.innerHTML = `
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
        gap:20px;padding:24px;background:radial-gradient(ellipse at center,#001a30 0%,#0d0d1a 70%);">
        <div style="font-family:'Boogaloo',cursive;font-size:36px;color:#4fc3f7;">📡 Relay</div>
        ${progressHtml}
        <div style="background:var(--card);border:2px solid var(--border);border-radius:16px;padding:28px 40px;text-align:center;">
          <div style="font-size:36px;margin-bottom:10px;">🎨</div>
          <div style="font-weight:800;font-size:18px;">
            <strong style="color:#4fc3f7;">${activePlayer?.name || '…'}</strong> is drawing…
          </div>
          <div style="color:var(--muted);font-size:13px;margin-top:8px;">
            ${turnsLeft} turn${turnsLeft!==1?'s':''} until it's your go!
          </div>
        </div>
        <button class="btn btn-secondary" onclick="backToMenu()">← Back</button>
      </div>`;
    }

    // Solo mode: auto-submit for bot players
    if (!isOnline && !imTurn && currentTurnIdx < turnOrder.length) {
      setTimeout(() => {
        // Generate a blank canvas for the bot
        const tmpC = document.createElement('canvas'); tmpC.width=100; tmpC.height=70;
        const tc = tmpC.getContext('2d'); tc.fillStyle='#1a1a2e'; tc.fillRect(0,0,100,70);
        drawings.push({ playerId: turnOrder[currentTurnIdx], playerName: players.find(p=>p.id===turnOrder[currentTurnIdx])?.name||'Bot', imgData: tmpC.toDataURL() });
        if (currentTurnIdx + 1 < turnOrder.length) currentTurnIdx++;
        else phase = 'guess';
        render();
      }, 600);
    }
  }

  function renderGuess() {
    const myGuessSubmitted = guesses[myId] !== undefined;
    const lastDrawing = drawings[drawings.length - 1];
    container.innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:20px;padding:24px;
      background:radial-gradient(ellipse at center,#001a30 0%,#0d0d1a 70%);">
      <div style="font-family:'Boogaloo',cursive;font-size:36px;color:#4fc3f7;">📡 Relay — Final Drawing!</div>
      <div style="color:var(--muted);font-size:14px;">The drawing has been passed through everyone. What do you think it shows?</div>
      ${lastDrawing ? `
        <div style="background:#1a1a2e;border:2px solid #4fc3f7;border-radius:16px;overflow:hidden;max-width:560px;width:100%;">
          <div style="padding:10px 16px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);">
            Final drawing by <strong style="color:#4fc3f7;">${lastDrawing.playerName}</strong>
          </div>
          <img src="${lastDrawing.imgData}" style="width:100%;max-height:300px;object-fit:contain;background:#1a1a2e;display:block;">
        </div>
      ` : ''}
      ${myGuessSubmitted ? `
        <div style="background:#4fc3f722;border:2px solid #4fc3f7;border-radius:14px;padding:20px 32px;text-align:center;">
          <div style="font-size:24px;margin-bottom:6px;">✅</div>
          <div style="font-family:'Boogaloo',cursive;font-size:20px;color:#4fc3f7;">Guess locked in!</div>
          <div style="color:var(--muted);font-size:13px;margin-top:4px;">
            Waiting for ${players.length - Object.keys(guesses).length} more…
          </div>
        </div>
      ` : `
        <div style="background:var(--card);border:2px solid var(--border);border-radius:16px;padding:24px 32px;max-width:500px;width:100%;text-align:center;">
          <div style="font-weight:800;margin-bottom:12px;font-size:16px;">What was originally drawn?</div>
          <div class="input-group" style="margin-bottom:12px;">
            <input id="gr-guess-input" type="text" maxlength="80" placeholder="Type your guess…"
              style="flex:1;background:#ffffff08;border:2px solid var(--border);border-radius:12px;
                padding:12px 16px;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;outline:none;"
              onkeydown="if(event.key==='Enter')grSubmitGuess()"/>
          </div>
          <button class="btn btn-primary" onclick="grSubmitGuess()" style="width:100%;background:linear-gradient(135deg,#4fc3f7,#a78bfa);">
            Lock In Guess 🔒
          </button>
        </div>
      `}
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
        ${players.map(p=>`
          <div style="background:${guesses[p.id]!==undefined?'#4fc3f722':'#ffffff08'};
            border:1px solid ${guesses[p.id]!==undefined?'#4fc3f7':'var(--border)'};
            border-radius:99px;padding:6px 14px;font-size:13px;font-weight:700;">
            ${guesses[p.id]!==undefined?'✅':'⏳'} ${p.name}
          </div>`).join('')}
      </div>
      <button class="btn btn-secondary" onclick="backToMenu()">← Back</button>
    </div>`;
    setTimeout(()=>{
      const inp=document.getElementById('gr-guess-input');
      if(inp) inp.focus();
    },50);

    // Solo: auto-fill bot guesses
    if (!isOnline) {
      const funGuesses = ['A cat doing taxes','Spaghetti on a trampoline','Confused wizard','Flying potato','Abstract existentialism'];
      players.filter(p=>p.id!==myId&&guesses[p.id]===undefined).forEach((p,i)=>{
        guesses[p.id] = funGuesses[i % funGuesses.length];
      });
    }
  }

  function renderReveal() {
    container.innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;
      gap:24px;padding:30px 20px;
      background:radial-gradient(ellipse at center,#001a30 0%,#0d0d1a 70%);">
      <div style="font-family:'Boogaloo',cursive;font-size:40px;color:#4fc3f7;">📡 Relay — Reveal!</div>

      <!-- Secret word -->
      <div style="background:var(--card);border:2px solid #4fc3f7;border-radius:16px;padding:20px 36px;text-align:center;">
        <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">The original secret word was</div>
        <div style="font-family:'Boogaloo',cursive;font-size:36px;color:#4fc3f7;">"${secretWord}"</div>
      </div>

      <!-- Drawing chain -->
      <div style="width:100%;max-width:900px;">
        <div style="font-weight:800;font-size:16px;margin-bottom:14px;text-align:center;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">
          The Drawing Chain
        </div>
        <div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;">
          ${drawings.map((d,i)=>`
            <div style="flex-shrink:0;width:220px;background:var(--card);border:2px solid var(--border);border-radius:16px;overflow:hidden;">
              <img src="${d.imgData}" style="width:100%;height:150px;object-fit:contain;background:#1a1a2e;display:block;">
              <div style="padding:10px 14px;border-top:1px solid var(--border);">
                <div style="font-size:11px;color:var(--muted);margin-bottom:2px;">Turn ${i+1}</div>
                <div style="font-weight:800;font-size:14px;color:#4fc3f7;">${d.playerName}</div>
              </div>
            </div>
            ${i < drawings.length-1 ? `<div style="display:flex;align-items:center;font-size:24px;flex-shrink:0;">➡️</div>` : ''}
          `).join('')}
        </div>
      </div>

      <!-- Guesses -->
      <div style="width:100%;max-width:700px;">
        <div style="font-weight:800;font-size:16px;margin-bottom:12px;text-align:center;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">
          Everyone's Guesses
        </div>
        ${players.map(p=>{
          const g = guesses[p.id] || '—';
          const correct = g.toLowerCase().trim().includes(secretWord.toLowerCase().trim().split(' ').slice(0,2).join(' ').toLowerCase());
          return `
          <div style="background:var(--card);border:2px solid ${correct?'var(--accent5)':'var(--border)'};
            border-radius:14px;padding:14px 20px;margin-bottom:10px;
            display:flex;align-items:center;gap:12px;
            ${correct?'box-shadow:0 0 16px #34d39933;':''}">
            <div style="font-size:24px;">${correct?'🎯':'🤔'}</div>
            <div>
              <div style="font-weight:800;font-size:15px;${correct?'color:var(--accent5);':''}">${p.name}</div>
              <div style="color:var(--muted);font-size:13px;">"${g}"${correct?' — So close!':''}</div>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
        <button class="btn btn-primary" onclick="launchGame('garticrelay')"
          style="background:linear-gradient(135deg,#4fc3f7,#a78bfa);">Play Again 🔁</button>
        <button class="btn btn-secondary" onclick="showGarticModePicker()">Change Mode</button>
        <button class="btn btn-secondary" onclick="backToMenu()">← Games</button>
      </div>
    </div>`;
  }

  // ── ACTIONS ───────────────────────────────────────────────────────
  window.grSetColor = c => { drawColor=c; renderDraw(); };
  window.grSetSize  = s => { drawSize=s; renderDraw(); };
  window.grClearCanvas = () => { canvasData=[]; renderDraw(); };

  window.grSubmitDrawing = function() {
    const canvas = document.getElementById('gr-canvas');
    if (!canvas) return;
    const imgData = canvas.toDataURL();
    myDrawing = imgData;
    canvasData = [];
    const entry = { playerId: myId, playerName: STATE.playerName, imgData };
    if (isOnline && !amHost) {
      broadcastGame({ gr:true, action:'submitDrawing', id:myId, playerName:STATE.playerName, imgData });
      // Optimistically add locally
      drawings.push(entry);
      render();
    } else {
      drawings.push(entry);
      if (currentTurnIdx + 1 < turnOrder.length) currentTurnIdx++;
      else phase = 'guess';
      render();
    }
  };

  window.grSubmitGuess = function() {
    const v = document.getElementById('gr-guess-input')?.value.trim();
    if (!v) { notify('Type a guess first!','error'); return; }
    myGuess = v;
    guesses[myId] = v;
    if (isOnline && !amHost) {
      broadcastGame({ gr:true, action:'submitGuess', id:myId, guess:v });
      render();
    } else {
      if (players.every(p => guesses[p.id] !== undefined)) {
        phase = 'reveal';
      }
      render();
    }
  };
}

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
buildGameSelect(); // pre-build so it's ready

</script>
</body>
</html>
